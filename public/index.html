<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beat Sheet Editor</title>
  <!-- QR code generator for print -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0d0d12; --bg2: #16161e; --bg3: #1e1e28; --border: #2a2a3a;
      --text: #e8e8ed; --dim: #6b6b80;
      --hook: #3b82f6; --intro: #06b6d4; --open-loop: #f59e0b; --loop-back: #ea580c;
      --payoff: #22c55e; --cta: #a855f7; --body: #6366f1; --test: #64748b;
      --escalate: #ef4444; --wildcard: #ec4899; --b-story: #14b8a6; --conclusion: #8b5cf6;
      --prepare: #f97316; --purchase: #10b981; --stakes: #f43f5e; --comments: #94a3b8;
      --scale-w: 1; --scale-h: 1; --scale-t: 1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

    .header {
      position: sticky; top: 0; z-index: 100; background: var(--bg);
      border-bottom: 1px solid var(--border); padding: 12px 16px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .sync-status { font-size: 11px; padding: 4px 10px; border-radius: 10px; background: var(--bg3); color: var(--dim); }
    .sync-status.syncing { background: var(--open-loop); color: #000; }
    .sync-status.saved   { background: var(--payoff); color: #000; }
    .sync-status.error   { background: var(--escalate); color: #fff; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .btn { padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg2); color: var(--text); font-size: 12px; font-weight: 500; cursor: pointer; }
    .btn:hover { border-color: var(--dim); }
    .btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    .btn-primary { background: var(--hook); border-color: var(--hook); color: #fff; }
    .btn-green   { background: var(--payoff); border-color: var(--payoff); color: #000; }
    .btn-active  { background: var(--hook) !important; border-color: var(--hook) !important; color: #fff !important; }

    .scale-controls { display: flex; align-items: center; gap: 8px; }
    .scale-controls label { font-size: 11px; color: var(--dim); white-space: nowrap; }
    .scale-controls input[type=range] { width: 80px; accent-color: var(--hook); cursor: pointer; }

    .filter-bar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); }
    .filter-bar label { font-size: 12px; color: var(--dim); }
    .filter-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; color: var(--text); font-size: 12px; }
    .status-counts { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
    .status-count { font-size: 11px; padding: 4px 10px; border-radius: 12px; background: var(--bg3); color: var(--dim); cursor: pointer; }
    .status-count:hover { background: var(--border); color: var(--text); }
    .status-count.active { background: var(--hook); color: white; }

    .legend { display: flex; gap: 12px; padding: 8px 16px; background: var(--bg); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--dim); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

    .videos { display: flex; flex-direction: column; }
    .video-row { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .video-row:nth-child(odd) { background: var(--bg); }
    .video-row:hover { background: var(--bg3); }
    .video-row.hidden { display: none; }
    .video-row-main { display: flex; align-items: stretch; min-height: calc(90px * var(--scale-h)); }

    .video-info { width: 200px; min-width: 200px; padding: 10px 12px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
    .video-meta { display: flex; align-items: center; gap: 8px; }
    .video-num { font-size: 10px; font-weight: 700; color: var(--dim); font-family: monospace; }
    .video-status { font-size: 9px; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; background: var(--bg3); color: var(--dim); }
    .video-title { font-size: 13px; font-weight: 600; color: var(--text); background: transparent; border: none; width: 100%; font-family: inherit; }
    .video-title:focus { outline: none; background: var(--bg3); border-radius: 3px; padding: 2px 4px; margin: -2px -4px; }
    .video-hook { font-size: 11px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .video-info-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .url-btn { display: inline-flex; align-items: center; justify-content: center; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; color: var(--dim); font-size: 11px; font-weight: 700; text-decoration: none; letter-spacing: 0.05em; }
    .url-btn:hover { border-color: var(--hook); color: var(--hook); }
    .char-count { font-size: 10px; color: var(--dim); }

    .segments { flex: 1; display: flex; align-items: center; gap: calc(4px * var(--scale-w)); padding: 8px 12px; overflow-x: auto; min-height: calc(90px * var(--scale-h)); }

    .seg {
      min-width: calc(120px * var(--scale-w)); max-width: calc(160px * var(--scale-w));
      flex-shrink: 0; background: var(--bg3); border-radius: 6px;
      padding: calc(6px * var(--scale-h)) calc(8px * var(--scale-w)); border-left: 3px solid var(--test);
      position: relative; cursor: grab; user-select: none;
    }
    .seg:active { cursor: grabbing; }
    .seg.dragging { opacity: 0.4; }
    .seg:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .seg.hook      { border-color: var(--hook); }
    .seg.intro     { border-color: var(--intro); }
    .seg.open-loop { border-color: var(--open-loop); background: linear-gradient(90deg, rgba(245,158,11,0.12) 0%, var(--bg3) 100%); }
    .seg.loop-back { border-color: var(--loop-back); background: linear-gradient(90deg, rgba(234,88,12,0.12) 0%, var(--bg3) 100%); }
    .seg.payoff    { border-color: var(--payoff); background: linear-gradient(90deg, rgba(34,197,94,0.12) 0%, var(--bg3) 100%); }
    .seg.cta       { border-color: var(--cta); }
    .seg.body      { border-color: var(--body); }
    .seg.test      { border-color: var(--test); }
    .seg.escalate  { border-color: var(--escalate); }
    .seg.wildcard  { border-color: var(--wildcard); }
    .seg.b-story   { border-color: var(--b-story); background: linear-gradient(90deg, rgba(20,184,166,0.12) 0%, var(--bg3) 100%); }
    .seg.conclusion { border-color: var(--conclusion); }
    .seg.prepare   { border-color: var(--prepare); background: linear-gradient(90deg, rgba(249,115,22,0.12) 0%, var(--bg3) 100%); }
    .seg.purchase  { border-color: var(--purchase); background: linear-gradient(90deg, rgba(16,185,129,0.12) 0%, var(--bg3) 100%); }
    .seg.stakes    { border-color: var(--stakes); background: linear-gradient(90deg, rgba(244,63,94,0.12) 0%, var(--bg3) 100%); }
    .seg.comments  { border-color: var(--comments); }

    .seg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 4px; overflow: hidden; }
    .seg-type { font-size: calc(9px * var(--scale-t)); font-weight: 600; text-transform: uppercase; background: var(--bg2); border: 1px solid var(--border); border-radius: 3px; padding: 2px 4px; color: var(--text); cursor: pointer; flex: 1; min-width: 0; }
    .seg-controls { display: flex; gap: 2px; flex-shrink: 0; }
    .seg-btn { width: 20px; height: 20px; border: none; border-radius: 3px; background: var(--bg2); color: var(--dim); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .seg-btn:hover { background: var(--border); color: var(--text); }
    .seg-btn.delete:hover { background: var(--escalate); color: white; }
    .compact-btns .seg-controls { display: none; }
    .seg-menu-btn { display: none; }
    .compact-btns .seg-menu-btn { display: flex; }

    .seg-dropdown { position: absolute; top: 30px; right: 0; z-index: 300; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 4px; display: flex; flex-direction: column; gap: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); min-width: 140px; }
    .seg-dropdown button { width: 100%; text-align: left; padding: 6px 10px; font-size: 12px; background: transparent; border: none; border-radius: 4px; color: var(--text); cursor: pointer; font-family: inherit; }
    .seg-dropdown button:hover { background: var(--border); }
    .seg-dropdown button.del:hover { background: var(--escalate); }

    .seg-title { width: 100%; background: transparent; border: none; font-size: calc(11px * var(--scale-t)); font-weight: 500; color: var(--text); font-family: inherit; margin-top: 4px; }
    .seg-title:focus { outline: none; background: var(--bg2); border-radius: 3px; padding: 2px; margin: 2px -2px; }
    .seg-desc  { width: 100%; background: transparent; border: none; resize: none; font-size: calc(10px * var(--scale-t)); color: var(--dim); font-family: inherit; margin-top: 4px; }
    .seg-desc:focus { outline: none; background: var(--bg2); border-radius: 3px; }
    .seg-notes { width: 100%; background: transparent; border: none; font-size: calc(9px * var(--scale-t)); color: var(--open-loop); font-style: italic; margin-top: 4px; font-family: inherit; }

    .seg-ta { width: 100%; background: transparent; border: none; resize: none; overflow: hidden; font-family: inherit; display: block; }
    .seg-ta:focus { outline: none; background: var(--bg2); border-radius: 3px; }
    .seg-title.seg-ta { font-size: calc(11px * var(--scale-t)); font-weight: 500; color: var(--text); margin-top: 4px; }
    .seg-notes.seg-ta { font-size: calc(9px * var(--scale-t)); color: var(--open-loop); font-style: italic; margin-top: 4px; }
    .wrap-mode .seg-desc { min-height: unset; overflow: hidden; resize: none; }
    .wrap-mode .seg { max-width: calc(180px * var(--scale-w)); }

    .arrow { color: var(--dim); font-size: 12px; flex-shrink: 0; padding: 0 2px; }
    .drop-indicator { width: 3px; align-self: stretch; min-height: calc(60px * var(--scale-h)); background: var(--hook); border-radius: 2px; flex-shrink: 0; animation: dropPulse 0.5s ease infinite alternate; }
    @keyframes dropPulse { from { opacity: 0.5; } to { opacity: 1; box-shadow: 0 0 6px var(--hook); } }
    .add-seg { min-width: 40px; height: calc(70px * var(--scale-h)); flex-shrink: 0; background: var(--bg2); border: 1px dashed var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--dim); font-size: 18px; margin-left: 4px; }
    .add-seg:hover { border-color: var(--hook); color: var(--hook); }
    .seg.seg-selected { outline: 2px solid var(--hook); outline-offset: 1px; }

    /* Media panel */
    .media-panel { border-top: 1px solid var(--border); background: var(--bg); }
    .mp-header { display: flex; align-items: center; gap: 10px; padding: 6px 12px; cursor: pointer; user-select: none; font-size: 12px; color: var(--dim); }
    .mp-header:hover { background: var(--bg2); }
    .mp-arrow { font-size: 10px; width: 12px; flex-shrink: 0; }
    .mp-label { font-weight: 600; color: var(--text); }
    .mp-count { font-size: 11px; color: var(--dim); }
    .mp-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    .mp-btn { padding: 4px 10px; font-size: 11px; border-radius: 5px; }
    .mp-btn-record { background: transparent; border-color: var(--escalate); color: var(--escalate); }
    .mp-btn-record.recording { background: var(--escalate); color: #fff; }
    .mp-body { display: none; flex-wrap: wrap; gap: 10px; padding: 10px 14px; align-items: flex-start; }
    .mp-body.open { display: flex; }
    .mp-item { position: relative; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; max-width: 200px; }
    .mp-item-audio { flex-direction: row; align-items: center; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; max-width: 300px; }
    .mp-item-video { max-width: 220px; }
    .mp-thumb { max-height: 120px; max-width: 180px; border-radius: 5px; border: 1px solid var(--border); cursor: pointer; object-fit: cover; }
    .mp-thumb:hover { border-color: var(--hook); }
    .mp-filename { font-size: 10px; color: var(--dim); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-left: 6px; }
    .mp-vid-desc { font-size: 10px; color: var(--dim); max-width: 200px; margin-top: 2px; }
    .mp-del { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; border: none; background: var(--escalate); color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .mp-del:hover { background: #c00; }
    .mp-empty { font-size: 11px; color: var(--dim); padding: 4px 0; }

    .empty, .loading { padding: 60px; text-align: center; color: var(--dim); }
    .empty h2, .loading h2 { font-size: 18px; margin-bottom: 12px; color: var(--text); }
    .clipboard-toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; background: var(--payoff); color: #000; border-radius: 8px; font-size: 12px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .clipboard-toast.show { opacity: 1; }

    #rec-indicator { display: none; position: fixed; bottom: 60px; right: 20px; z-index: 500; background: var(--escalate); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; gap: 12px; align-items: center; }
    #rec-indicator.show { display: flex; }
    #rec-stop { padding: 4px 10px; border: 2px solid rgba(255,255,255,0.6); border-radius: 5px; background: transparent; color: #fff; cursor: pointer; font-size: 12px; }
    #rec-stop:hover { background: rgba(255,255,255,0.2); }

    #editor-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; padding: 16px; }
    #editor-modal.open { display: flex; }
    .editor-wrap { background: #1a1a24; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; width: min(1300px, calc(100vw - 32px)); height: min(840px, calc(100vh - 32px)); }
    .editor-toolbar { display: flex; align-items: center; gap: 14px; padding: 8px 12px; background: #111118; border-bottom: 1px solid #2a2a3a; flex-wrap: wrap; flex-shrink: 0; }
    .etool-group { display: flex; align-items: center; gap: 5px; }
    .etool-group + .etool-group { border-left: 1px solid #2a2a3a; padding-left: 14px; }
    .etool-btn { width: 34px; height: 34px; border: 1px solid #2a2a3a; border-radius: 6px; background: #1e1e28; color: #e8e8ed; cursor: pointer; font-size: 16px; }
    .etool-btn:hover { border-color: #6b6b80; }
    .etool-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .etool-label { font-size: 11px; color: #6b6b80; margin-right: 2px; }
    #draw-color { width: 30px; height: 30px; border: 1px solid #2a2a3a; padding: 1px; background: none; cursor: pointer; border-radius: 5px; }
    #draw-width, #draw-opacity { width: 70px; accent-color: #3b82f6; cursor: pointer; }
    .etool-val { font-size: 11px; color: #6b6b80; min-width: 28px; }
    #draw-canvas-wrap { flex: 1; min-height: 0; overflow: hidden; cursor: crosshair; background: #fff; }
    #draw-canvas-wrap canvas { display: block; }
    .editor-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 10px 12px; background: #111118; border-top: 1px solid #2a2a3a; flex-shrink: 0; }

    @media (max-width: 768px) {
      .video-row-main { flex-direction: column; min-height: unset; }
      .video-info { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
      .segments { min-height: 120px; }
      .scale-controls { display: none; }
    }

    @media print {
      @page { size: landscape; margin: 10mm; }
      .header, .filter-bar, .legend, .btn, .add-seg, .seg-controls, .seg-menu-btn, .clipboard-toast, .arrow, .char-count, .media-panel, #rec-indicator, #editor-modal { display: none !important; }
      body { background: white; color: #111; font-size: 11px; }
      .videos { display: block; }
      .video-row { border: 1.5px solid #ccc; border-radius: 6px; page-break-inside: avoid; break-inside: avoid; margin-bottom: 8mm; background: white !important; }
      .video-row.hidden { display: none !important; }
      .video-row-main { display: flex; align-items: flex-start; }
      .video-info { width: 150px !important; min-width: 150px !important; padding: 8px 10px; font-size: 10px; border-right: 1px solid #ddd; border-radius: 6px 0 0 6px; }
      .video-title { font-size: 12px; font-weight: 700; color: #111; }
      .video-hook { white-space: normal; font-size: 9px; color: #555; margin-top: 4px; }
      .print-qr { margin-top: 8px; line-height: 0; }
      .segments { overflow: visible !important; flex-wrap: wrap; gap: 5px !important; padding: 6px 8px !important; align-items: flex-start; }
      .seg { min-width: 110px !important; max-width: 155px !important; padding: 6px !important; background: #f8f8f8 !important; border-radius: 5px; border-width: 2px !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; page-break-inside: avoid; break-inside: avoid; }
      .seg-type { font-size: 7px !important; padding: 1px 3px; }
      .seg-title, .seg-notes, .seg-desc { display: none !important; }
      .pf { display: block; word-wrap: break-word; overflow-wrap: break-word; white-space: pre-wrap; }
      .pf-type  { font-size: 7px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #888; margin-bottom: 2px; }
      .pf-title { font-size: 10px; font-weight: 700; color: #111; margin-top: 2px; line-height: 1.3; }
      .pf-desc  { font-size: 9px; color: #333; margin-top: 3px; line-height: 1.4; }
      .pf-notes { font-size: 8px; color: #b06000; font-style: italic; margin-top: 2px; }
      .seg.seg-selected { outline: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>&#127926; Beat Sheet Editor</h1>
  <span class="sync-status" id="syncStatus">Loading...</span>
  <span id="count" style="color: var(--dim)"></span>
  <div class="scale-controls">
    <label>W&nbsp;<span id="scaleWVal">100</span>%</label>
    <input type="range" min="25" max="600" value="100" id="scaleW" oninput="updateScale()">
    <label>H&nbsp;<span id="scaleHVal">100</span>%</label>
    <input type="range" min="25" max="600" value="100" id="scaleH" oninput="updateScale()">
    <label>T&nbsp;<span id="scaleTVal">100</span>%</label>
    <input type="range" min="25" max="600" value="100" id="scaleT" oninput="updateScale()">
  </div>
  <div class="header-actions">
    <button class="btn" id="undoBtn" onclick="undo()" disabled>&#8617; Undo</button>
    <button class="btn" id="redoBtn" onclick="redo()" disabled>&#8618; Redo</button>
    <button class="btn" id="wrapBtn" onclick="toggleWrap()">Wrap</button>
    <button class="btn btn-primary" onclick="pullFromNotion()">&#8595; Pull from Notion</button>
    <button class="btn btn-green"   onclick="pushAllToNotion()">&#8593; Push All to Notion</button>
    <button class="btn"             onclick="window.print()">&#128424; Print</button>
  </div>
</div>

<div class="filter-bar">
  <label>Filter:</label>
  <select class="filter-select" id="statusFilter" onchange="applyFilter()"><option value="">All</option></select>
  <div class="status-counts" id="statusCounts"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--hook)"></div> Hook</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--open-loop)"></div> Open loop</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--loop-back)"></div> Loop back</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--payoff)"></div> Payoff</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--cta)"></div> CTA</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--body)"></div> Body</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--b-story)"></div> B-story</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--prepare)"></div> Prepare</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--purchase)"></div> Purchase</div>
</div>

<div id="videos" class="videos"><div class="loading"><h2>Loading from Notion...</h2></div></div>
<div class="clipboard-toast" id="toast">Copied!</div>

<div id="rec-indicator">
  <span>&#9210; Recording</span>
  <button id="rec-stop" onclick="stopRecord()">&#9209; Stop</button>
</div>

<div id="editor-modal">
  <div class="editor-wrap">
    <div class="editor-toolbar">
      <div class="etool-group">
        <button class="etool-btn active" id="etool-pen"    onclick="setDrawTool('pen')"    title="Pen (freehand)">&#9998;</button>
        <button class="etool-btn"        id="etool-line"   onclick="setDrawTool('line')"   title="Line (Shift=45°)">&#9585;</button>
        <button class="etool-btn"        id="etool-rect"   onclick="setDrawTool('rect')"   title="Rectangle (Shift=square)">&#9645;</button>
        <button class="etool-btn"        id="etool-circle" onclick="setDrawTool('circle')" title="Circle (Shift=equal)">&#9711;</button>
        <button class="etool-btn"        id="etool-select" onclick="setDrawTool('select')" title="Select &amp; Move">&#8598;</button>
        <button class="etool-btn"        id="etool-eraser" onclick="setDrawTool('eraser')" title="Eraser">&#9003;</button>
        <button class="etool-btn"        id="etool-fill"   onclick="setDrawTool('fill')"   title="Paint Bucket">&#127798;</button>
      </div>
      <div class="etool-group">
        <span class="etool-label">Color</span>
        <input type="color" id="draw-color" value="#000000" oninput="updateDrawBrush()">
        <span class="etool-label">Width</span>
        <input type="range" id="draw-width" min="1" max="40" value="4" oninput="updateDrawBrush()">
        <span class="etool-val" id="draw-width-val">4</span>
        <span class="etool-label">Opacity</span>
        <input type="range" id="draw-opacity" min="10" max="100" value="100" oninput="updateDrawBrush()">
        <span class="etool-val" id="draw-opacity-val">100%</span>
      </div>
      <div class="etool-group">
        <button class="etool-btn" onclick="undoDraw()"  title="Undo (&#8984;Z)">&#8617;</button>
        <button class="etool-btn" onclick="redoDraw()"  title="Redo (&#8984;&#8679;Z)">&#8618;</button>
        <button class="etool-btn" onclick="clearDraw()" title="Clear all">&#x2715;</button>
      </div>
    </div>
    <div id="draw-canvas-wrap">
      <canvas id="draw-canvas"></canvas>
    </div>
    <div class="editor-footer">
      <button class="btn" onclick="cancelEditor()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditor()">Save &amp; Upload</button>
    </div>
  </div>
</div>

<script>
let videos = [];
let clipboard = null;
let history = [];
let historyIndex = -1;
let selectedVi = null, selectedSi = null;
let lastHoveredVi = 0;
let wrapMode = false;
const TYPES = ['hook','intro','open-loop','loop-back','payoff','cta','body','test','escalate','wildcard','b-story','conclusion','prepare','purchase','stakes','comments'];

function saveHistory() {
  history = history.slice(0, historyIndex + 1);
  history.push(JSON.parse(JSON.stringify(videos)));
  if (history.length > 50) history = history.slice(history.length - 50);
  historyIndex = history.length - 1;
  updateUndoRedoBtns();
}
function undo() { if (historyIndex <= 0) return; historyIndex--; videos = JSON.parse(JSON.stringify(history[historyIndex])); render(); updateUndoRedoBtns(); }
function redo() { if (historyIndex >= history.length - 1) return; historyIndex++; videos = JSON.parse(JSON.stringify(history[historyIndex])); render(); updateUndoRedoBtns(); }
function updateUndoRedoBtns() {
  document.getElementById('undoBtn').disabled = historyIndex <= 0;
  document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
}

document.addEventListener('keydown', e => {
  const meta = e.metaKey || e.ctrlKey;
  if (!meta) return;
  const inText = ['INPUT','TEXTAREA'].includes(document.activeElement?.tagName);
  if (e.key === 'z' && !inText) { e.preventDefault(); e.shiftKey ? redo() : undo(); }
  if (e.key === 'c' && !inText && selectedVi !== null) { e.preventDefault(); collectAll(); clipboard = JSON.parse(JSON.stringify(videos[selectedVi].roadmap.segments[selectedSi])); showToast('Copied!'); }
  if (e.key === 'v' && !inText && clipboard) { e.preventDefault(); collectAll(); const s = JSON.parse(JSON.stringify(clipboard)); s.id = Date.now(); videos[lastHoveredVi].roadmap.segments.push(s); saveHistory(); render(); showToast('Pasted!'); }
});

function updateScale() {
  const w = document.getElementById('scaleW').value / 100;
  const h = document.getElementById('scaleH').value / 100;
  const t = document.getElementById('scaleT').value / 100;
  document.getElementById('scaleWVal').textContent = Math.round(w * 100);
  document.getElementById('scaleHVal').textContent = Math.round(h * 100);
  document.getElementById('scaleTVal').textContent = Math.round(t * 100);
  document.documentElement.style.setProperty('--scale-w', w);
  document.documentElement.style.setProperty('--scale-h', h);
  document.documentElement.style.setProperty('--scale-t', t);
  localStorage.setItem('bs-scale-w', w); localStorage.setItem('bs-scale-h', h); localStorage.setItem('bs-scale-t', t);
  document.body.classList.toggle('compact-btns', w < 0.8);
}
function initScale() {
  const w = parseFloat(localStorage.getItem('bs-scale-w') || '1');
  const h = parseFloat(localStorage.getItem('bs-scale-h') || '1');
  const t = parseFloat(localStorage.getItem('bs-scale-t') || '1');
  document.getElementById('scaleW').value = Math.round(w * 100);
  document.getElementById('scaleH').value = Math.round(h * 100);
  document.getElementById('scaleT').value = Math.round(t * 100);
  document.getElementById('scaleWVal').textContent = Math.round(w * 100);
  document.getElementById('scaleHVal').textContent = Math.round(h * 100);
  document.getElementById('scaleTVal').textContent = Math.round(t * 100);
  document.documentElement.style.setProperty('--scale-w', w);
  document.documentElement.style.setProperty('--scale-h', h);
  document.documentElement.style.setProperty('--scale-t', t);
  document.body.classList.toggle('compact-btns', w < 0.8);
}

async function pullFromNotion() {
  setStatus('syncing', 'Pulling...');
  try {
    const res = await fetch('/api/pull');
    if (!res.ok) throw new Error('Pull failed');
    videos = await res.json();
    buildFilter(); render();
    history = [JSON.parse(JSON.stringify(videos))]; historyIndex = 0; updateUndoRedoBtns();
    setStatus('saved', 'Loaded ' + videos.length + ' videos');
    setTimeout(() => setStatus('', 'Ready'), 2000);
  } catch (err) { setStatus('error', err.message); }
}
async function pushAllToNotion() {
  collectAll();
  setStatus('syncing', 'Pushing ' + videos.length + ' videos...');
  try {
    const res = await fetch('/api/push-all', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(videos) });
    if (!res.ok) throw new Error('Push failed');
    setStatus('saved', 'All saved to Notion!');
    setTimeout(() => setStatus('', 'Ready'), 2000);
  } catch (err) { setStatus('error', err.message); }
}
function setStatus(type, msg) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status' + (type ? ' ' + type : '');
  el.textContent = msg;
}

function videoCharCount(v) { return (v.roadmap?.segments || []).reduce((n, s) => n + (s.title||'').length + (s.desc||'').length + (s.notes||'').length, 0); }
function updateCharCount(vi) {
  let n = 0;
  document.querySelectorAll('.video-row[data-vi="' + vi + '"] .seg-title, .video-row[data-vi="' + vi + '"] .seg-desc, .video-row[data-vi="' + vi + '"] .seg-notes').forEach(el => n += (el.value || '').length);
  const el = document.getElementById('cc-' + vi);
  if (el) el.textContent = n + ' chars';
}

function collectAll() {
  document.querySelectorAll('.video-row').forEach(row => {
    const vi = +row.dataset.vi;
    if (isNaN(vi)) return;
    videos[vi].roadmap.segments = [];
    row.querySelectorAll('.seg').forEach(seg => {
      videos[vi].roadmap.segments.push({ id: Date.now() + Math.random(), type: seg.dataset.type, title: seg.querySelector('.seg-title').value, desc: seg.querySelector('.seg-desc').value, notes: seg.querySelector('.seg-notes').value });
    });
  });
}

function buildFilter() {
  const statuses = [...new Set(videos.map(v => v.status || '(none)'))].sort();
  const sel = document.getElementById('statusFilter');
  sel.innerHTML = '<option value="">All (' + videos.length + ')</option>' + statuses.map(s => { const c = videos.filter(v => (v.status||'(none)') === s).length; return '<option value="' + esc(s) + '">' + esc(s) + ' (' + c + ')</option>'; }).join('');
  document.getElementById('statusCounts').innerHTML = statuses.map(s => { const c = videos.filter(v => (v.status||'(none)') === s).length; return '<span class="status-count" onclick="document.getElementById(\'statusFilter\').value=\'' + esc(s) + '\';applyFilter()">' + esc(s) + ': ' + c + '</span>'; }).join('');
}
function applyFilter() {
  const f = document.getElementById('statusFilter').value;
  document.querySelectorAll('.video-row').forEach(row => row.classList.toggle('hidden', f && row.dataset.status !== f));
  const vis = document.querySelectorAll('.video-row:not(.hidden)').length;
  document.getElementById('count').textContent = f ? vis + ' of ' + videos.length : videos.length + ' videos';
}

function render() {
  const c = document.getElementById('videos');
  if (!videos.length) { c.innerHTML = '<div class="empty"><h2>No videos</h2><p>Make sure some cards have "Beat Sheetin" checked</p></div>'; return; }
  const openPanels = {};
  document.querySelectorAll('.mp-body.open').forEach(el => { openPanels[el.id.replace('mpb-','')] = true; });
  c.innerHTML = videos.map((v, vi) =>
    '<div class="video-row" data-vi="' + vi + '" data-status="' + esc(v.status || '(none)') + '">' +
      '<div class="video-row-main">' +
        '<div class="video-info">' +
          '<div class="video-meta"><span class="video-num">#' + (vi+1) + '</span><span class="video-status">' + esc(v.status||'-') + '</span></div>' +
          '<input class="video-title" value="' + esc(v.title) + '" placeholder="Title...">' +
          '<div class="video-info-row">' +
            (v.videoUrl ? '<a class="url-btn" href="' + esc(v.videoUrl) + '" target="_blank" rel="noopener">URL</a>' : '<span class="url-btn" style="opacity:0.4;cursor:default">no url</span>') +
            '<span class="char-count" id="cc-' + vi + '">' + videoCharCount(v) + ' chars</span>' +
          '</div>' +
          '<div class="video-hook">' + esc(v.hook || 'No hook') + '</div>' +
        '</div>' +
        '<div class="segments" data-vi="' + vi + '">' +
          (v.roadmap?.segments || []).map((s, si) => renderSeg(vi, si, s)).join('<span class="arrow">&#8594;</span>') +
          '<div class="add-seg" onclick="addSeg(' + vi + ')">+</div>' +
        '</div>' +
      '</div>' +
      renderMediaPanel(v, vi) +
    '</div>'
  ).join('');
  Object.keys(openPanels).forEach(vi => {
    const body = document.getElementById('mpb-' + vi); const arrow = document.getElementById('mpa-' + vi);
    if (body) { body.classList.add('open'); body.style.display = 'flex'; }
    if (arrow) arrow.textContent = '▾';
  });
  applyFilter(); setupDrag(); setupCardSelect(); setupHoverTracking();
  if (wrapMode) setupWrapResize();
}

function renderSeg(vi, si, s) {
  const titleHtml = wrapMode
    ? '<textarea class="seg-title seg-ta" placeholder="Title..." oninput="autoResize(this);updateCharCount(' + vi + ')">' + esc(s.title) + '</textarea>'
    : '<input class="seg-title" value="' + esc(s.title) + '" placeholder="Title..." oninput="updateCharCount(' + vi + ')">';
  const notesHtml = wrapMode
    ? '<textarea class="seg-notes seg-ta" placeholder="Notes..." oninput="autoResize(this);updateCharCount(' + vi + ')">' + esc(s.notes) + '</textarea>'
    : '<input class="seg-notes" value="' + esc(s.notes) + '" placeholder="Notes..." oninput="updateCharCount(' + vi + ')">';
  const descAttrs = wrapMode ? 'oninput="autoResize(this);updateCharCount(' + vi + ')"' : 'rows="3" oninput="updateCharCount(' + vi + ')"';
  return '<div class="seg ' + s.type + '" data-type="' + s.type + '" data-vi="' + vi + '" data-si="' + si + '" draggable="true">' +
    '<div class="seg-header">' +
      '<select class="seg-type" onchange="chgType(this)">' + TYPES.map(t => '<option value="' + t + '"' + (t === s.type ? ' selected' : '') + '>' + t.replace(/-/g,' ').toUpperCase() + '</option>').join('') + '</select>' +
      '<div class="seg-controls">' +
        '<button class="seg-btn" onclick="moveSeg(' + vi + ',' + si + ',-1)">&#8592;</button>' +
        '<button class="seg-btn" onclick="moveSeg(' + vi + ',' + si + ',1)">&#8594;</button>' +
        '<button class="seg-btn" onclick="copySeg(' + vi + ',' + si + ')">&#x2398;</button>' +
        '<button class="seg-btn" onclick="pasteSeg(' + vi + ',' + si + ')">&#x2397;</button>' +
        '<button class="seg-btn delete" onclick="delSeg(' + vi + ',' + si + ')">&#215;</button>' +
      '</div>' +
      '<button class="seg-btn seg-menu-btn" onclick="toggleMenu(this,event,' + vi + ',' + si + ')">&#8942;</button>' +
    '</div>' +
    titleHtml +
    '<textarea class="seg-desc" placeholder="Description..." ' + descAttrs + '>' + esc(s.desc) + '</textarea>' +
    notesHtml +
  '</div>';
}

function renderMediaPanel(v, vi) {
  const items = v.mediaIndex || [];
  const imgCnt = items.filter(m => m.kind === 'image').length;
  const audioCnt = items.filter(m => m.kind === 'audio').length;
  const vidCnt = items.filter(m => m.kind === 'video').length;
  const parts = [];
  if (imgCnt) parts.push(imgCnt + ' image' + (imgCnt > 1 ? 's' : ''));
  if (audioCnt) parts.push(audioCnt + ' audio');
  if (vidCnt) parts.push(vidCnt + ' video' + (vidCnt > 1 ? 's' : ''));
  const countStr = parts.join(' &middot; ') || '';
  const bodyHtml = items.length ? items.map(m => renderMediaItem(m, vi)).join('') : '<span class="mp-empty">No media yet. Add images, audio, or video below.</span>';
  const pid = esc(v.id);
  return '<div class="media-panel" id="mp-' + vi + '">' +
    '<div class="mp-header" onclick="toggleMediaPanel(' + vi + ')">' +
      '<span class="mp-arrow" id="mpa-' + vi + '">&#9658;</span>' +
      '<span class="mp-label">Media</span>' +
      (countStr ? '<span class="mp-count">' + countStr + '</span>' : '') +
      '<div class="mp-actions" onclick="event.stopPropagation()">' +
        '<button class="btn mp-btn" onclick="openDraw(' + vi + ')">&#9998; Draw</button>' +
        '<button class="btn mp-btn" onclick="openImageEdit(' + vi + ')">&#128444; Image</button>' +
        '<button class="btn mp-btn mp-btn-record" id="recbtn-' + vi + '" onclick="startRecord(' + vi + ')">&#9210; Record</button>' +
        '<button class="btn mp-btn" onclick="uploadFile(' + vi + ',0)">&#8593; Audio</button>' +
        '<button class="btn mp-btn" onclick="uploadFile(' + vi + ',1)">&#127909; Video</button>' +
      '</div>' +
    '</div>' +
    '<div class="mp-body" id="mpb-' + vi + '">' + bodyHtml + '</div>' +
  '</div>';
}

function renderMediaItem(m, vi) {
  const r2 = esc(m.r2_key); const bid = esc(m.block_id || 'unknown');
  const del = '<button class="mp-del" title="Delete" data-vi="' + vi + '" data-r2="' + r2 + '" data-bid="' + bid + '" onclick="deleteMedia(this)">&#215;</button>';
  if (m.kind === 'image') return '<div class="mp-item"><img class="mp-thumb" src="' + esc(m.public_url) + '" loading="lazy" title="' + esc(m.filename||'') + '">' + del + '</div>';
  if (m.kind === 'audio') return '<div class="mp-item mp-item-audio"><audio controls src="' + esc(m.public_url) + '" style="height:32px;max-width:220px"></audio><span class="mp-filename">' + esc(m.filename||'audio') + '</span>' + del + '</div>';
  if (m.kind === 'video') return '<div class="mp-item mp-item-video"><video controls src="' + esc(m.public_url) + '" style="max-height:130px;max-width:200px" preload="metadata"></video>' + (m.description ? '<p class="mp-vid-desc">' + esc(m.description) + '</p>' : '') + del + '</div>';
  return '';
}

function toggleMediaPanel(vi) {
  const body = document.getElementById('mpb-' + vi); const arrow = document.getElementById('mpa-' + vi);
  if (!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  body.style.display = isOpen ? 'none' : 'flex';
  if (arrow) arrow.innerHTML = isOpen ? '&#9658;' : '&#9662;';
}
function refreshMediaPanelDOM(vi) {
  const old = document.getElementById('mp-' + vi);
  if (!old) return;
  const wasOpen = document.getElementById('mpb-' + vi)?.classList.contains('open');
  const tmp = document.createElement('div'); tmp.innerHTML = renderMediaPanel(videos[vi], vi);
  old.replaceWith(tmp.firstChild);
  if (wasOpen) { const body = document.getElementById('mpb-' + vi); const arrow = document.getElementById('mpa-' + vi); if (body) { body.classList.add('open'); body.style.display = 'flex'; } if (arrow) arrow.innerHTML = '&#9662;'; }
}

async function getUploadUrl(pageId, filename, kind) {
  const res = await fetch('/api/upload-url', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ notion_id: pageId, filename, kind }) });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'Upload URL request failed'); }
  return res.json();
}
async function doUpload(blob, uploadUrl, contentType) {
  const res = await fetch(uploadUrl, { method: 'PUT', body: blob, headers: { 'Content-Type': contentType || blob.type || 'application/octet-stream' } });
  if (!res.ok) throw new Error('Upload to R2 failed (' + res.status + ')');
}
async function confirmUpload(data) {
  const res = await fetch('/api/confirm-upload', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'Confirm upload failed'); }
  return res.json();
}
function uploadFile(vi, kindCode) {
  const kind = kindCode === 0 ? 'audio' : 'video';
  const pageId = videos[vi].id;
  const input = document.createElement('input'); input.type = 'file'; input.accept = kind === 'audio' ? 'audio/*' : 'video/*';
  input.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    setStatus('syncing', 'Uploading ' + kind + '...');
    try {
      const { uploadUrl, publicUrl, r2_key } = await getUploadUrl(pageId, file.name, kind);
      await doUpload(file, uploadUrl, file.type);
      let description = '';
      if (kind === 'video') description = window.prompt('Add a description (optional):') || '';
      const { block_id } = await confirmUpload({ notion_id: pageId, r2_key, public_url: publicUrl, kind, filename: file.name, description });
      if (!videos[vi].mediaIndex) videos[vi].mediaIndex = [];
      videos[vi].mediaIndex.push({ r2_key, block_id, kind, filename: file.name, description, public_url: publicUrl });
      refreshMediaPanelDOM(vi);
      const body = document.getElementById('mpb-' + vi); if (body && !body.classList.contains('open')) toggleMediaPanel(vi);
      setStatus('saved', kind.charAt(0).toUpperCase() + kind.slice(1) + ' uploaded!'); setTimeout(() => setStatus('', 'Ready'), 2000);
    } catch (err) { setStatus('error', err.message); }
  };
  input.click();
}
async function deleteMedia(btn) {
  const vi = +btn.dataset.vi; const r2_key = btn.dataset.r2; const block_id = btn.dataset.bid;
  if (!confirm('Delete this media item?')) return;
  const pageId = videos[vi].id;
  try {
    const res = await fetch('/api/delete-media', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ notion_id: pageId, r2_key, block_id }) });
    if (!res.ok) throw new Error('Delete failed');
    videos[vi].mediaIndex = (videos[vi].mediaIndex || []).filter(m => m.r2_key !== r2_key);
    refreshMediaPanelDOM(vi);
  } catch (err) { setStatus('error', err.message); }
}

let mediaRecorder = null, audioChunks = [], recCtx = null;
async function startRecord(vi) {
  if (mediaRecorder && mediaRecorder.state === 'recording') { stopRecord(); return; }
  const pageId = videos[vi].id;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = []; recCtx = { pageId, vi };
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      document.getElementById('rec-indicator').classList.remove('show');
      const btn = document.getElementById('recbtn-' + recCtx.vi); if (btn) btn.classList.remove('recording');
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const filename = 'recording-' + Date.now() + '.webm';
      setStatus('syncing', 'Uploading audio...');
      try {
        const { uploadUrl, publicUrl, r2_key } = await getUploadUrl(recCtx.pageId, filename, 'audio');
        await doUpload(blob, uploadUrl, 'audio/webm');
        const { block_id } = await confirmUpload({ notion_id: recCtx.pageId, r2_key, public_url: publicUrl, kind: 'audio', filename });
        if (!videos[recCtx.vi].mediaIndex) videos[recCtx.vi].mediaIndex = [];
        videos[recCtx.vi].mediaIndex.push({ r2_key, block_id, kind: 'audio', filename, description: '', public_url: publicUrl });
        const curVi = recCtx.vi; refreshMediaPanelDOM(curVi);
        const body = document.getElementById('mpb-' + curVi); if (body && !body.classList.contains('open')) toggleMediaPanel(curVi);
        setStatus('saved', 'Audio saved!'); setTimeout(() => setStatus('', 'Ready'), 2000);
      } catch (err) { setStatus('error', err.message); }
      mediaRecorder = null; recCtx = null;
    };
    mediaRecorder.start();
    document.getElementById('rec-indicator').classList.add('show');
    const btn = document.getElementById('recbtn-' + vi); if (btn) btn.classList.add('recording');
  } catch (err) { alert('Microphone access denied: ' + err.message); }
}
function stopRecord() { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }

let fabricCanvas = null, editorCtx = null;
let drawTool = 'pen', drawHistory = [], drawHistIdx = -1;
let drawStart = null, activeShape = null, editorClipboard = null;

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha.toFixed(2) + ')';
}
function setDrawTool(tool) {
  const prev = drawTool;
  drawTool = tool;
  document.querySelectorAll('.etool-btn[id^="etool-"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('etool-' + tool); if (btn) btn.classList.add('active');
  if (!fabricCanvas) return;
  if (prev === 'select' && tool !== 'select') {
    fabricCanvas.discardActiveObject();
    fabricCanvas.getObjects().forEach(o => o.set({ selectable: false }));
    fabricCanvas.renderAll();
  }
  fabricCanvas.isDrawingMode = (tool === 'pen' || tool === 'eraser');
  fabricCanvas.selection = (tool === 'select');
  if (tool === 'select') {
    fabricCanvas.getObjects().forEach(o => o.set({ selectable: true, evented: true }));
    fabricCanvas.renderAll();
  }
  updateDrawBrush();
}
function updateDrawBrush() {
  const w = +document.getElementById('draw-width').value, op = +document.getElementById('draw-opacity').value;
  document.getElementById('draw-width-val').textContent = w;
  document.getElementById('draw-opacity-val').textContent = op + '%';
  if (!fabricCanvas) return;
  const col = document.getElementById('draw-color').value;
  if (drawTool === 'eraser') {
    fabricCanvas.freeDrawingBrush.color = '#ffffff';
    fabricCanvas.freeDrawingBrush.width = w * 2;
  } else {
    fabricCanvas.freeDrawingBrush.color = op < 100 ? hexToRgba(col, op / 100) : col;
    fabricCanvas.freeDrawingBrush.width = w;
  }
}
function saveDrawState() {
  if (!fabricCanvas) return;
  drawHistory = drawHistory.slice(0, drawHistIdx + 1);
  drawHistory.push(JSON.stringify(fabricCanvas.toJSON()));
  if (drawHistory.length > 50) drawHistory.shift();
  drawHistIdx = drawHistory.length - 1;
}
function undoDraw() { if (!fabricCanvas || drawHistIdx <= 0) return; drawHistIdx--; fabricCanvas.loadFromJSON(JSON.parse(drawHistory[drawHistIdx]), () => fabricCanvas.renderAll()); }
function redoDraw() { if (!fabricCanvas || drawHistIdx >= drawHistory.length - 1) return; drawHistIdx++; fabricCanvas.loadFromJSON(JSON.parse(drawHistory[drawHistIdx]), () => fabricCanvas.renderAll()); }
function clearDraw() { if (!fabricCanvas) return; fabricCanvas.getObjects().slice().forEach(o => fabricCanvas.remove(o)); fabricCanvas.backgroundColor = '#ffffff'; fabricCanvas.renderAll(); saveDrawState(); }

function openDraw(vi) { initEditor(null, videos[vi].id, vi); }
function openImageEdit(vi) {
  const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = ev => initEditor(ev.target.result, videos[vi].id, vi); reader.readAsDataURL(file); };
  input.click();
}
function initEditor(imgDataUrl, pageId, vi) {
  if (typeof fabric === 'undefined') { alert('Drawing tools loading — try again in a moment.'); return; }
  editorCtx = { pageId, vi };
  document.getElementById('editor-modal').classList.add('open');
  if (fabricCanvas) { try { fabricCanvas.dispose(); } catch {} fabricCanvas = null; }
  drawHistory = []; drawHistIdx = -1; activeShape = null; drawStart = null;
  const wrap = document.getElementById('draw-canvas-wrap');
  const w = wrap.clientWidth || 1100, h = wrap.clientHeight || 640;
  fabricCanvas = new fabric.Canvas('draw-canvas', { backgroundColor: '#ffffff', selection: false });
  fabricCanvas.setWidth(w); fabricCanvas.setHeight(h);
  updateDrawBrush(); setDrawTool('pen');
  if (imgDataUrl) {
    fabric.Image.fromURL(imgDataUrl, img => {
      const scale = Math.min(w / img.width, h / img.height, 1);
      img.set({ left: 0, top: 0, scaleX: scale, scaleY: scale, selectable: false, evented: false });
      fabricCanvas.add(img); fabricCanvas.sendToBack(img); fabricCanvas.renderAll(); saveDrawState();
    });
  } else { saveDrawState(); }
  fabricCanvas.on('mouse:down', opt => {
    if (drawTool === 'pen' || drawTool === 'eraser' || drawTool === 'select') return;
    if (drawTool === 'fill') {
      const col = document.getElementById('draw-color').value;
      if (opt.target) { opt.target.set('fill', col); }
      else { fabricCanvas.backgroundColor = col; }
      fabricCanvas.renderAll(); saveDrawState(); return;
    }
    const p = fabricCanvas.getPointer(opt.e); drawStart = { x: p.x, y: p.y };
    const col = document.getElementById('draw-color').value, wid = +document.getElementById('draw-width').value, op = +document.getElementById('draw-opacity').value / 100;
    if (drawTool === 'rect')   activeShape = new fabric.Rect({ left: p.x, top: p.y, width: 0, height: 0, fill: 'transparent', stroke: col, strokeWidth: wid, opacity: op, selectable: false, evented: true });
    if (drawTool === 'circle') activeShape = new fabric.Ellipse({ left: p.x, top: p.y, rx: 0, ry: 0, fill: 'transparent', stroke: col, strokeWidth: wid, opacity: op, selectable: false, evented: true });
    if (drawTool === 'line')   activeShape = new fabric.Line([p.x, p.y, p.x, p.y], { stroke: col, strokeWidth: wid, opacity: op, selectable: false, evented: true });
    if (activeShape) fabricCanvas.add(activeShape);
  });
  fabricCanvas.on('mouse:move', opt => {
    if (!activeShape || !drawStart) return;
    const p = fabricCanvas.getPointer(opt.e); let dx = p.x - drawStart.x, dy = p.y - drawStart.y;
    if (opt.e.shiftKey) {
      if (drawTool === 'rect' || drawTool === 'circle') { const s = Math.min(Math.abs(dx), Math.abs(dy)); dx = Math.sign(dx)*s; dy = Math.sign(dy)*s; }
      else if (drawTool === 'line') { const ang = Math.round(Math.atan2(dy,dx)/(Math.PI/4))*(Math.PI/4), len = Math.sqrt(dx*dx+dy*dy); dx = Math.cos(ang)*len; dy = Math.sin(ang)*len; }
    }
    if (drawTool === 'rect')   activeShape.set({ width: Math.abs(dx), height: Math.abs(dy), left: dx<0?drawStart.x+dx:drawStart.x, top: dy<0?drawStart.y+dy:drawStart.y });
    if (drawTool === 'circle') activeShape.set({ rx: Math.abs(dx)/2, ry: Math.abs(dy)/2, left: dx<0?drawStart.x+dx:drawStart.x, top: dy<0?drawStart.y+dy:drawStart.y });
    if (drawTool === 'line')   activeShape.set({ x2: drawStart.x+dx, y2: drawStart.y+dy });
    fabricCanvas.renderAll();
  });
  fabricCanvas.on('mouse:up', () => { if (activeShape) { activeShape.set({ selectable: false, evented: true }); activeShape = null; drawStart = null; fabricCanvas.renderAll(); saveDrawState(); } });
  fabricCanvas.on('path:created', e => { if (e.path) e.path.set({ selectable: false, evented: true }); saveDrawState(); });
  document.addEventListener('keydown', onDrawKey);
}
function onDrawKey(e) {
  if (!fabricCanvas) return;
  if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); e.shiftKey ? redoDraw() : undoDraw(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'c') { const o = fabricCanvas.getActiveObject(); if (o) editorClipboard = o.toObject(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'v' && editorClipboard) {
    fabric.util.enlivenObjects([editorClipboard], objs => { objs.forEach(o => { o.set({ left: o.left+20, top: o.top+20 }); fabricCanvas.add(o); }); fabricCanvas.renderAll(); saveDrawState(); });
  }
}
async function saveEditor() {
  if (!fabricCanvas) return;
  const dataUrl = fabricCanvas.toDataURL({ format: 'png', multiplier: 1 });
  document.getElementById('editor-modal').classList.remove('open');
  document.removeEventListener('keydown', onDrawKey);
  const ctx = editorCtx; editorCtx = null;
  const blob = await fetch(dataUrl).then(r => r.blob());
  const filename = 'image-' + Date.now() + '.png';
  setStatus('syncing', 'Uploading image...');
  try {
    const up = await getUploadUrl(ctx.pageId, filename, 'image');
    await doUpload(blob, up.uploadUrl, 'image/png');
    const conf = await confirmUpload({ notion_id: ctx.pageId, r2_key: up.r2_key, public_url: up.publicUrl, kind: 'image', filename });
    if (!videos[ctx.vi].mediaIndex) videos[ctx.vi].mediaIndex = [];
    videos[ctx.vi].mediaIndex.push({ r2_key: up.r2_key, block_id: conf.block_id, kind: 'image', filename, description: '', public_url: up.publicUrl });
    refreshMediaPanelDOM(ctx.vi); const body = document.getElementById('mpb-' + ctx.vi); if (body && !body.classList.contains('open')) toggleMediaPanel(ctx.vi);
    setStatus('saved', 'Image saved!'); setTimeout(() => setStatus('', 'Ready'), 2000);
  } catch (err) { setStatus('error', err.message); }
  try { fabricCanvas.dispose(); } catch {} fabricCanvas = null;
}
function cancelEditor() {
  document.getElementById('editor-modal').classList.remove('open');
  document.removeEventListener('keydown', onDrawKey);
  try { if (fabricCanvas) { fabricCanvas.dispose(); fabricCanvas = null; } } catch {}
  editorCtx = null;
}

function toggleMenu(btn, e, vi, si) {
  e.stopPropagation(); const seg = btn.closest('.seg'); const existing = seg.querySelector('.seg-dropdown'); closeMenus(); if (existing) return;
  const m = document.createElement('div'); m.className = 'seg-dropdown';
  m.innerHTML = '<button onclick="moveSeg(' + vi + ',' + si + ',-1);closeMenus()">&#8592; Move Left</button><button onclick="moveSeg(' + vi + ',' + si + ',1);closeMenus()">&#8594; Move Right</button><button onclick="copySeg(' + vi + ',' + si + ');closeMenus()">&#x2398; Copy</button><button onclick="pasteSeg(' + vi + ',' + si + ');closeMenus()">&#x2397; Paste</button><button class="del" onclick="delSeg(' + vi + ',' + si + ')">&#215; Delete</button>';
  seg.appendChild(m);
}
function closeMenus() { document.querySelectorAll('.seg-dropdown').forEach(m => m.remove()); }
function setupCardSelect() { document.querySelectorAll('.seg').forEach(seg => { seg.addEventListener('click', e => { if (e.target.closest('button, input, textarea, select')) return; document.querySelectorAll('.seg').forEach(s => s.classList.remove('seg-selected')); seg.classList.add('seg-selected'); selectedVi = +seg.dataset.vi; selectedSi = +seg.dataset.si; }); }); }
function setupHoverTracking() { document.querySelectorAll('.segments').forEach(container => { container.addEventListener('mouseover', () => { lastHoveredVi = +container.dataset.vi; }); }); }
document.addEventListener('click', e => { closeMenus(); if (!e.target.closest('.seg')) { document.querySelectorAll('.seg').forEach(s => s.classList.remove('seg-selected')); selectedVi = null; selectedSi = null; } });

function chgType(sel) { const seg = sel.closest('.seg'); TYPES.forEach(t => seg.classList.remove(t)); seg.classList.add(sel.value); seg.dataset.type = sel.value; collectAll(); saveHistory(); }
function addSeg(vi) { collectAll(); videos[vi].roadmap.segments.push({ id: Date.now(), type: 'body', title: '', desc: '', notes: '' }); saveHistory(); render(); }
function delSeg(vi, si) { collectAll(); videos[vi].roadmap.segments.splice(si, 1); saveHistory(); render(); }
function moveSeg(vi, si, dir) { collectAll(); const segs = videos[vi].roadmap.segments; const np = si + dir; if (np < 0 || np >= segs.length) return; const [s] = segs.splice(si, 1); segs.splice(np, 0, s); saveHistory(); render(); }
function copySeg(vi, si) { collectAll(); clipboard = JSON.parse(JSON.stringify(videos[vi].roadmap.segments[si])); showToast('Copied!'); }
function pasteSeg(vi, si) { if (!clipboard) return; collectAll(); const s = JSON.parse(JSON.stringify(clipboard)); s.id = Date.now(); videos[vi].roadmap.segments.splice(si + 1, 0, s); saveHistory(); render(); showToast('Pasted!'); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500); }

function setupDrag() {
  let dragData = null;
  function calcDropIndex(container, clientX) { const segs = [...container.querySelectorAll('.seg:not(.dragging)')]; for (let i = 0; i < segs.length; i++) { const r = segs[i].getBoundingClientRect(); if (clientX < r.left + r.width / 2) return i; } return segs.length; }
  function showDropIndicator(container, index) { clearDropIndicators(); const ind = document.createElement('div'); ind.className = 'drop-indicator'; const segs = [...container.querySelectorAll('.seg:not(.dragging)')]; if (!segs.length || index >= segs.length) { container.insertBefore(ind, container.querySelector('.add-seg') || null); } else { const prev = segs[index].previousSibling; container.insertBefore(ind, (prev && prev.classList && prev.classList.contains('arrow')) ? prev : segs[index]); } }
  function clearDropIndicators() { document.querySelectorAll('.drop-indicator').forEach(el => el.remove()); }
  document.querySelectorAll('.seg').forEach(seg => {
    seg.ondragstart = e => { dragData = { vi: +seg.dataset.vi, si: +seg.dataset.si }; seg.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; };
    seg.ondragend = () => { seg.classList.remove('dragging'); clearDropIndicators(); dragData = null; };
  });
  document.querySelectorAll('.segments').forEach(container => {
    container.ondragover = e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; showDropIndicator(container, calcDropIndex(container, e.clientX)); };
    container.ondragleave = e => { if (!container.contains(e.relatedTarget)) clearDropIndicators(); };
    container.ondrop = e => { e.preventDefault(); if (!dragData) return; const toVi = +container.dataset.vi; const toSi = calcDropIndex(container, e.clientX); clearDropIndicators(); collectAll(); const [moved] = videos[dragData.vi].roadmap.segments.splice(dragData.si, 1); videos[toVi].roadmap.segments.splice(toSi, 0, moved); saveHistory(); render(); };
  });
}

function toggleWrap() { wrapMode = !wrapMode; document.getElementById('wrapBtn').classList.toggle('btn-active', wrapMode); collectAll(); render(); if (wrapMode) setupWrapResize(); }
function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
function setupWrapResize() { document.querySelectorAll('.seg-ta, .seg-desc').forEach(el => { autoResize(el); if (!el._arBound) { el._arBound = true; el.addEventListener('input', () => autoResize(el)); } }); }

window.addEventListener('beforeprint', () => {
  collectAll();
  videos.forEach((v, vi) => {
    const row = document.querySelector('.video-row[data-vi="' + vi + '"]');
    if (!row || row.classList.contains('hidden')) return;
    const infoPanel = row.querySelector('.video-info');
    if (v.videoUrl && infoPanel && typeof qrcode !== 'undefined') {
      try { const qr = qrcode(0, 'M'); qr.addData(v.videoUrl); qr.make(); const div = document.createElement('div'); div.className = 'print-qr'; div.innerHTML = qr.createSvgTag({ scalable: true, width: '64px', height: '64px' }); infoPanel.appendChild(div); } catch {}
    }
    const segs = v.roadmap?.segments || [];
    row.querySelectorAll('.seg').forEach((segEl, si) => {
      const s = segs[si]; if (!s) return;
      const mk = (cls, val) => { const d = document.createElement('div'); d.className = 'pf ' + cls; d.textContent = val || ''; segEl.appendChild(d); };
      mk('pf-type',  s.type.replace(/-/g,' ').toUpperCase());
      mk('pf-title', s.title || '');
      if (s.desc)  mk('pf-desc',  s.desc);
      if (s.notes) mk('pf-notes', s.notes);
    });
  });
});
window.addEventListener('afterprint', () => { document.querySelectorAll('.pf, .print-qr').forEach(el => el.remove()); });

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

initScale();
pullFromNotion();
</script>
<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js" defer></script>
