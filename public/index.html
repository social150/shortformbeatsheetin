<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beat Sheet Editor</title>
  <!-- QR code generator for print -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0d0d12; --bg2: #16161e; --bg3: #1e1e28; --border: #2a2a3a;
      --text: #e8e8ed; --dim: #6b6b80;
      --hook: #3b82f6; --intro: #06b6d4; --open-loop: #f59e0b; --loop-back: #ea580c;
      --payoff: #22c55e; --cta: #a855f7; --body: #6366f1; --test: #64748b;
      --escalate: #ef4444; --wildcard: #ec4899; --b-story: #14b8a6; --conclusion: #8b5cf6;
      --prepare: #f97316; --purchase: #10b981; --stakes: #f43f5e; --comments: #94a3b8;
      --scale-w: 1; --scale-h: 1; --scale-t: 1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100; background: var(--bg);
      border-bottom: 1px solid var(--border); padding: 12px 16px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .sync-status { font-size: 11px; padding: 4px 10px; border-radius: 10px; background: var(--bg3); color: var(--dim); }
    .sync-status.syncing { background: var(--open-loop); color: #000; }
    .sync-status.saved   { background: var(--payoff); color: #000; }
    .sync-status.error   { background: var(--escalate); color: #fff; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .btn { padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg2); color: var(--text); font-size: 12px; font-weight: 500; cursor: pointer; }
    .btn:hover { border-color: var(--dim); }
    .btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    .btn-primary { background: var(--hook); border-color: var(--hook); color: #fff; }
    .btn-green   { background: var(--payoff); border-color: var(--payoff); color: #000; }
    .btn-active  { background: var(--hook) !important; border-color: var(--hook) !important; color: #fff !important; }

    .scale-controls { display: flex; align-items: center; gap: 8px; }
    .scale-controls label { font-size: 11px; color: var(--dim); white-space: nowrap; }
    .scale-controls input[type=range] { width: 80px; accent-color: var(--hook); cursor: pointer; }

    /* ── Filter / Legend ─────────────────────────────────────── */
    .filter-bar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); }
    .filter-bar label { font-size: 12px; color: var(--dim); }
    .filter-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; color: var(--text); font-size: 12px; }
    .status-counts { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
    .status-count { font-size: 11px; padding: 4px 10px; border-radius: 12px; background: var(--bg3); color: var(--dim); cursor: pointer; }
    .status-count:hover { background: var(--border); color: var(--text); }
    .status-count.active { background: var(--hook); color: white; }

    .legend { display: flex; gap: 12px; padding: 8px 16px; background: var(--bg); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--dim); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

    /* ── Video rows ──────────────────────────────────────────── */
    .videos { display: flex; flex-direction: column; }

    .video-row {
      display: flex; flex-direction: column;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .video-row:nth-child(odd) { background: var(--bg); }
    .video-row:hover { background: var(--bg3); }
    .video-row.hidden { display: none; }

    .video-row-main {
      display: flex; align-items: stretch;
      min-height: calc(90px * var(--scale-h));
    }

    .video-info { width: 200px; min-width: 200px; padding: 10px 12px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
    .video-meta { display: flex; align-items: center; gap: 8px; }
    .video-num { font-size: 10px; font-weight: 700; color: var(--dim); font-family: monospace; }
    .video-status { font-size: 9px; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; background: var(--bg3); color: var(--dim); }
    .video-title { font-size: 13px; font-weight: 600; color: var(--text); background: transparent; border: none; width: 100%; font-family: inherit; resize: none; overflow: hidden; line-height: 1.4; }
    .video-title:focus { outline: none; background: var(--bg3); border-radius: 3px; padding: 2px 4px; margin: -2px -4px; }
    .video-hook { font-size: 11px; color: var(--dim); background: transparent; border: none; width: 100%; font-family: inherit; resize: none; overflow: hidden; line-height: 1.4; }
    .video-hook:focus { outline: none; background: var(--bg3); border-radius: 3px; padding: 2px 4px; margin: -2px -4px; color: var(--text); }

    .video-info-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .url-btn { display: inline-flex; align-items: center; justify-content: center; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; color: var(--dim); font-size: 11px; font-weight: 700; text-decoration: none; letter-spacing: 0.05em; }
    .url-btn:hover { border-color: var(--hook); color: var(--hook); }
    .char-count { font-size: 10px; color: var(--dim); }

    /* ── Segments ────────────────────────────────────────────── */
    .segments { flex: 1; display: flex; align-items: center; gap: calc(4px * var(--scale-w)); padding: 8px 12px; overflow-x: auto; min-height: calc(90px * var(--scale-h)); }

    .seg {
      min-width: calc(120px * var(--scale-w)); max-width: calc(160px * var(--scale-w));
      flex-shrink: 0; background: var(--bg3); border-radius: 6px;
      padding: calc(6px * var(--scale-h)) calc(8px * var(--scale-w)); border-left: 3px solid var(--test);
      position: relative; cursor: grab; user-select: none;
    }
    .seg:active { cursor: grabbing; }
    .seg.dragging { opacity: 0.4; }
    .seg:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .seg.hook      { border-color: var(--hook); }
    .seg.intro     { border-color: var(--intro); }
    .seg.open-loop { border-color: var(--open-loop); background: linear-gradient(90deg, rgba(245,158,11,0.12) 0%, var(--bg3) 100%); }
    .seg.loop-back { border-color: var(--loop-back); background: linear-gradient(90deg, rgba(234,88,12,0.12) 0%, var(--bg3) 100%); }
    .seg.payoff    { border-color: var(--payoff); background: linear-gradient(90deg, rgba(34,197,94,0.12) 0%, var(--bg3) 100%); }
    .seg.cta       { border-color: var(--cta); }
    .seg.body      { border-color: var(--body); }
    .seg.test      { border-color: var(--test); }
    .seg.escalate  { border-color: var(--escalate); }
    .seg.wildcard  { border-color: var(--wildcard); }
    .seg.b-story   { border-color: var(--b-story); background: linear-gradient(90deg, rgba(20,184,166,0.12) 0%, var(--bg3) 100%); }
    .seg.conclusion { border-color: var(--conclusion); }
    .seg.prepare   { border-color: var(--prepare); background: linear-gradient(90deg, rgba(249,115,22,0.12) 0%, var(--bg3) 100%); }
    .seg.purchase  { border-color: var(--purchase); background: linear-gradient(90deg, rgba(16,185,129,0.12) 0%, var(--bg3) 100%); }
    .seg.stakes    { border-color: var(--stakes); background: linear-gradient(90deg, rgba(244,63,94,0.12) 0%, var(--bg3) 100%); }
    .seg.comments  { border-color: var(--comments); }

    .seg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 4px; overflow: hidden; }
    .seg-type {
      font-size: calc(9px * var(--scale-t)); font-weight: 600; text-transform: uppercase;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 3px;
      padding: 2px 4px; color: var(--text); cursor: pointer; flex: 1; min-width: 0;
    }
    .seg-controls { display: flex; gap: 2px; flex-shrink: 0; }
    .seg-btn { width: 20px; height: 20px; border: none; border-radius: 3px; background: var(--bg2); color: var(--dim); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .seg-btn:hover { background: var(--border); color: var(--text); }
    .seg-btn.delete:hover { background: var(--escalate); color: white; }

    .compact-btns .seg-controls { display: none; }
    .seg-menu-btn { display: none; }
    .compact-btns .seg-menu-btn { display: flex; }

    .seg-dropdown {
      position: absolute; top: 30px; right: 0; z-index: 300;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
      padding: 4px; display: flex; flex-direction: column; gap: 2px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6); min-width: 140px;
    }
    .seg-dropdown button { width: 100%; text-align: left; padding: 6px 10px; font-size: 12px; background: transparent; border: none; border-radius: 4px; color: var(--text); cursor: pointer; font-family: inherit; }
    .seg-dropdown button:hover { background: var(--border); }
    .seg-dropdown button.del:hover { background: var(--escalate); }

    .seg-title  { width: 100%; background: transparent; border: none; font-size: calc(11px * var(--scale-t)); font-weight: 500; color: var(--text); font-family: inherit; margin-top: 4px; }
    .seg-title:focus { outline: none; background: var(--bg2); border-radius: 3px; padding: 2px; margin: 2px -2px; }
    .seg-desc   { width: 100%; background: transparent; border: none; resize: none; font-size: calc(10px * var(--scale-t)); color: var(--dim); font-family: inherit; margin-top: 4px; rows: 3; }
    .seg-desc:focus { outline: none; background: var(--bg2); border-radius: 3px; }
    .seg-notes  { width: 100%; background: transparent; border: none; font-size: calc(9px * var(--scale-t)); color: var(--open-loop); font-style: italic; margin-top: 4px; font-family: inherit; }

    /* Wrap mode */
    .seg-ta { width: 100%; background: transparent; border: none; resize: none; overflow: hidden; font-family: inherit; display: block; }
    .seg-ta:focus { outline: none; background: var(--bg2); border-radius: 3px; }
    .seg-title.seg-ta { font-size: calc(11px * var(--scale-t)); font-weight: 500; color: var(--text); margin-top: 4px; }
    .seg-notes.seg-ta { font-size: calc(9px * var(--scale-t)); color: var(--open-loop); font-style: italic; margin-top: 4px; }
    .wrap-mode .seg-desc { min-height: unset; overflow: hidden; resize: none; }
    .wrap-mode .seg { max-width: calc(180px * var(--scale-w)); }
    .wrap-mode .segments { flex-wrap: wrap; overflow-x: hidden; overflow-y: visible; align-items: flex-start; height: auto; min-height: unset; }
    .wrap-mode .arrow { display: none; }

    .arrow { color: var(--dim); font-size: 12px; flex-shrink: 0; padding: 0 2px; }
    .drop-indicator { width: 3px; align-self: stretch; min-height: calc(60px * var(--scale-h)); background: var(--hook); border-radius: 2px; flex-shrink: 0; animation: dropPulse 0.5s ease infinite alternate; }
    @keyframes dropPulse { from { opacity: 0.5; } to { opacity: 1; box-shadow: 0 0 6px var(--hook); } }
    .add-seg { min-width: 40px; height: calc(70px * var(--scale-h)); flex-shrink: 0; background: var(--bg2); border: 1px dashed var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--dim); font-size: 18px; margin-left: 4px; }
    .add-seg:hover { border-color: var(--hook); color: var(--hook); }
    .seg.seg-selected { outline: 2px solid var(--hook); outline-offset: 1px; }

    /* ── Media panel ─────────────────────────────────────────── */
    .media-panel { border-top: 1px solid var(--border); background: var(--bg); }
    .mp-header {
      display: flex; align-items: center; gap: 10px; padding: 6px 12px;
      cursor: pointer; user-select: none; font-size: 12px; color: var(--dim);
    }
    .mp-header:hover { background: var(--bg2); }
    .mp-arrow { font-size: 10px; width: 12px; flex-shrink: 0; }
    .mp-label { font-weight: 600; color: var(--text); }
    .mp-count { font-size: 11px; color: var(--dim); }
    .mp-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    .mp-btn { padding: 4px 10px; font-size: 11px; border-radius: 5px; }
    .mp-btn-record { background: transparent; border-color: var(--escalate); color: var(--escalate); }
    .mp-btn-record.recording { background: var(--escalate); color: #fff; }

    .mp-body { display: none; flex-wrap: wrap; gap: 10px; padding: 10px 14px; align-items: flex-start; }
    .mp-body.open { display: flex; }

    .mp-item { position: relative; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; max-width: 200px; }
    .mp-item-audio { flex-direction: row; align-items: center; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; max-width: 300px; }
    .mp-item-video { max-width: 220px; }
    .mp-thumb { max-height: 120px; max-width: 180px; border-radius: 5px; border: 1px solid var(--border); cursor: pointer; object-fit: cover; }
    .mp-thumb:hover { border-color: var(--hook); }
    .mp-filename { font-size: 10px; color: var(--dim); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-left: 6px; }
    .mp-vid-desc { font-size: 10px; color: var(--dim); max-width: 200px; margin-top: 2px; }
    .mp-del { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; border: none; background: var(--escalate); color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .mp-del:hover { background: #c00; }
    .mp-empty { font-size: 11px; color: var(--dim); padding: 4px 0; }

    /* ── Inline media cards (in segments row) ───────────────── */
    .mp-inline { display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
      gap:4px; padding:4px 6px 6px; min-width:90px; max-width:140px; cursor:grab;
      position:relative; align-self:flex-start; }
    .mp-inline-controls { display:flex; gap:2px; align-items:center; justify-content:center; width:100%; margin-bottom:2px; }
    .mp-inline-thumb { max-height:80px; max-width:120px; border-radius:4px; object-fit:cover;
      cursor:pointer; border:1px solid var(--border); }
    .mp-inline-thumb:hover { border-color:#3b82f6; }
    .mp-inline-icon { font-size:24px; line-height:1; }
    .mp-inline-label { font-size:10px; color:var(--dim); text-align:center; word-break:break-all;
      max-width:120px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .mp-item[data-r2] { cursor:grab; }
    .mp-item[data-r2]:active { cursor:grabbing; }
    /* ── Image lightbox ──────────────────────────────────────── */
    #img-preview { display:none; position:fixed; inset:0; z-index:900;
      background:rgba(0,0,0,0.9); align-items:center; justify-content:center; cursor:zoom-out; }
    #img-preview.open { display:flex; }
    #img-preview-img { max-width:90vw; max-height:90vh; object-fit:contain; border-radius:6px; cursor:default; }
    #img-preview-close { position:fixed; top:16px; right:20px; background:none; border:none;
      color:#fff; font-size:30px; cursor:pointer; line-height:1; z-index:901; }
    /* ── Misc ────────────────────────────────────────────────── */
    .empty, .loading { padding: 60px; text-align: center; color: var(--dim); }
    .empty h2, .loading h2 { font-size: 18px; margin-bottom: 12px; color: var(--text); }
    .clipboard-toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; background: var(--payoff); color: #000; border-radius: 8px; font-size: 12px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .clipboard-toast.show { opacity: 1; }

    /* ── Recording indicator ─────────────────────────────────── */
    #rec-indicator {
      display: none; position: fixed; bottom: 60px; right: 20px; z-index: 500;
      background: var(--escalate); color: #fff; padding: 10px 16px; border-radius: 8px;
      font-size: 12px; font-weight: 600; gap: 12px; align-items: center;
    }
    #rec-indicator.show { display: flex; }
    #rec-stop { padding: 4px 10px; border: 2px solid rgba(255,255,255,0.6); border-radius: 5px; background: transparent; color: #fff; cursor: pointer; font-size: 12px; }
    #rec-stop:hover { background: rgba(255,255,255,0.2); }

    /* ── Drawing canvas modal ────────────────────────────────── */
    #editor-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; padding: 16px; }
    #editor-modal.open { display: flex; }
    .editor-wrap { background: #1a1a24; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; width: min(1300px, calc(100vw - 32px)); height: min(840px, calc(100vh - 32px)); }
    .editor-toolbar { display: flex; align-items: center; gap: 14px; padding: 8px 12px; background: #111118; border-bottom: 1px solid #2a2a3a; flex-wrap: wrap; flex-shrink: 0; }
    .etool-group { display: flex; align-items: center; gap: 5px; }
    .etool-group + .etool-group { border-left: 1px solid #2a2a3a; padding-left: 14px; }
    .etool-btn { width: 34px; height: 34px; border: 1px solid #2a2a3a; border-radius: 6px; background: #1e1e28; color: #e8e8ed; cursor: pointer; font-size: 16px; }
    .etool-btn:hover { border-color: #6b6b80; }
    .etool-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .etool-label { font-size: 11px; color: #6b6b80; margin-right: 2px; }
    #draw-color { width: 30px; height: 30px; border: 1px solid #2a2a3a; padding: 1px; background: none; cursor: pointer; border-radius: 5px; }
    #draw-width, #draw-opacity { width: 70px; accent-color: #3b82f6; cursor: pointer; }
    .etool-val { font-size: 11px; color: #6b6b80; min-width: 28px; }
    .etool-numval { width: 44px; background: #1e1e28; border: 1px solid #2a2a3a; color: #e8e8ed; border-radius: 4px; padding: 2px 4px; font-size: 12px; text-align: center; }
    #draw-canvas-wrap { flex: 1; min-height: 0; overflow: hidden; cursor: crosshair; background: #2a2a3a; }
    #draw-canvas-wrap canvas { display: block; box-shadow: 0 0 0 1px #555; }
    .editor-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 10px 12px; background: #111118; border-top: 1px solid #2a2a3a; flex-shrink: 0; }
    .etool-tool { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .etool-hotkey { font-size: 9px; color: #4b4b5b; line-height: 1; user-select: none; }
    .eraser-mode-group { display: none !important; }
    .eraser-mode-group.visible { display: flex !important; }
    .eraser-mode-btn { font-size: 10px !important; width: auto !important; padding: 0 7px !important; }
    .text-options-group { display: none !important; }
    .text-options-group.visible { display: flex !important; }
    .text-font-select { font-size: 11px; height: 24px; border: 1px solid #444; background: #1e1e2e; color: #cdd6f4; border-radius: 4px; cursor: pointer; }
    .etool-numval { width: 38px; font-size: 11px; background: #1e1e2e; border: 1px solid #444; color: #cdd6f4; border-radius: 4px; text-align: center; height: 22px; }

    /* ── Mobile ──────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .video-row-main { flex-direction: column; min-height: unset; }
      .video-info { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
      .segments { min-height: 120px; }
      .scale-controls { display: none; }
    }

    /* ── Print ───────────────────────────────────────────────── */
    @media print {
      @page { size: landscape; margin: 10mm; }

      .header, .filter-bar, .legend, .btn, .add-seg,
      .seg-controls, .seg-menu-btn, .clipboard-toast,
      .arrow, .char-count, .media-panel,
      #rec-indicator, #editor-modal { display: none !important; }

      body { background: white; color: #111; font-size: 11px; }
      .videos { display: block; }

      .video-row {
        border: 1.5px solid #ccc; border-radius: 6px;
        page-break-inside: avoid; break-inside: avoid;
        margin-bottom: 8mm; background: white !important;
      }
      .video-row.hidden { display: none !important; }

      .video-row-main { display: flex; align-items: flex-start; }

      .video-info {
        width: 150px !important; min-width: 150px !important;
        padding: 8px 10px; font-size: 10px;
        border-right: 1px solid #ddd; border-radius: 6px 0 0 6px;
      }
      .video-title { font-size: 12px; font-weight: 700; color: #111; }
      .video-hook  { white-space: normal; font-size: 9px; color: #555; margin-top: 4px; }
      .print-qr    { margin-top: 8px; line-height: 0; }

      .segments {
        overflow: visible !important; flex-wrap: wrap;
        gap: 5px !important; padding: 6px 8px !important;
        align-items: flex-start;
      }

      .seg {
        min-width: 110px !important; max-width: 155px !important;
        padding: 6px !important; background: #f8f8f8 !important;
        border-radius: 5px; border-width: 2px !important;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
        page-break-inside: avoid; break-inside: avoid;
      }
      .seg-type { font-size: 7px !important; padding: 1px 3px; }

      .seg-title, .seg-notes, .seg-desc { display: none !important; }
      .pf { display: block; word-wrap: break-word; overflow-wrap: break-word; white-space: pre-wrap; }
      .pf-type  { font-size: 7px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #888; margin-bottom: 2px; }
      .pf-title { font-size: 10px; font-weight: 700; color: #111; margin-top: 2px; line-height: 1.3; }

      .pf-notes { font-size: 8px; color: #b06000; font-style: italic; margin-top: 2px; }
      .seg.seg-selected { outline: none; }
    }
  </style>

<script>
let videos = [];
function getTimeline(v) {
  if (!v.timeline) {
    v.timeline = (v.roadmap?.segments || []).map(s => ({ k: 'seg', id: s.id }));
  }
  return v.timeline;
}
function moveMedia(vi, r2, dir) {
  collectAll();
  const tl = getTimeline(videos[vi]);
  const ti = tl.findIndex(item => item.k === 'media' && item.r2 === r2);
  if (ti === -1) return;
  const newTi = ti + dir;
  if (newTi < 0 || newTi >= tl.length) return;
  tl.splice(newTi, 0, tl.splice(ti, 1)[0]);
  videos[vi].timeline = tl;
  saveHistory(); render();
}
function removeMediaFromRow(btn) {
  const vi = +btn.dataset.vi;
  const r2 = btn.dataset.r2;
  videos[vi].timeline = getTimeline(videos[vi]).filter(item => !(item.k === 'media' && item.r2 === r2));
  saveHistory(); render();
}
function previewImg(src) {
  document.getElementById('img-preview-img').src = src;
  document.getElementById('img-preview').classList.add('open');
}
function closeImgPreview() { document.getElementById('img-preview').classList.remove('open'); }
let clipboard = null;
let history = [];
let historyIndex = -1;
let selectedVi = null, selectedSi = null;
let lastHoveredVi = 0;
let wrapMode = false;
const TYPES = ['hook','intro','open-loop','loop-back','payoff','cta','body','test','escalate','wildcard','b-story','conclusion','prepare','purchase','stakes','comments'];

// ── History ─────────────────────────────────────────────────
function saveHistory() {
  history = history.slice(0, historyIndex + 1);
  history.push(JSON.parse(JSON.stringify(videos)));
  if (history.length > 50) history = history.slice(history.length - 50);
  historyIndex = history.length - 1;
  updateUndoRedoBtns();
}
function undo() {
  if (historyIndex <= 0) return;
  historyIndex--;
  videos = JSON.parse(JSON.stringify(history[historyIndex]));
  render();
  updateUndoRedoBtns();
}
function redo() {
  if (historyIndex >= history.length - 1) return;
  historyIndex++;
  videos = JSON.parse(JSON.stringify(history[historyIndex]));
  render();
  updateUndoRedoBtns();
}
function updateUndoRedoBtns() {
  document.getElementById('undoBtn').disabled = historyIndex <= 0;
  document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
}

document.addEventListener('keydown', e => {
  if (document.getElementById('editor-modal').classList.contains('open')) return;
  if (e.key === 'Escape' && document.getElementById('img-preview').classList.contains('open')) { closeImgPreview(); return; }
  const meta = e.metaKey || e.ctrlKey;
  if (!meta) return;
  const inText = ['INPUT','TEXTAREA'].includes(document.activeElement?.tagName);
  if (e.key === 'z' && !inText) { e.preventDefault(); e.shiftKey ? redo() : undo(); }
  if (e.key === 'c' && !inText && selectedVi !== null) {
    e.preventDefault();
    collectAll();
    clipboard = JSON.parse(JSON.stringify(videos[selectedVi].roadmap.segments[selectedSi]));
    showToast('Copied!');
  }
  if (e.key === 'v' && !inText && clipboard) {
    e.preventDefault();
    collectAll();
    const s = JSON.parse(JSON.stringify(clipboard));
    s.id = Date.now();
    videos[lastHoveredVi].roadmap.segments.push(s);
    getTimeline(videos[lastHoveredVi]).push({ k: 'seg', id: s.id });
    saveHistory();
    render();
    showToast('Pasted!');
  }
});

// ── Scale controls ───────────────────────────────────────────
function updateScale() {
  const w = document.getElementById('scaleW').value / 100;
  const h = document.getElementById('scaleH').value / 100;
  const t = document.getElementById('scaleT').value / 100;
  document.getElementById('scaleWVal').textContent = Math.round(w * 100);
  document.getElementById('scaleHVal').textContent = Math.round(h * 100);
  document.getElementById('scaleTVal').textContent = Math.round(t * 100);
  document.documentElement.style.setProperty('--scale-w', w);
  document.documentElement.style.setProperty('--scale-h', h);
  document.documentElement.style.setProperty('--scale-t', t);
  localStorage.setItem('bs-scale-w', w);
  localStorage.setItem('bs-scale-h', h);
  localStorage.setItem('bs-scale-t', t);
  document.body.classList.toggle('compact-btns', w < 0.8);
}
function initScale() {
  const w = parseFloat(localStorage.getItem('bs-scale-w') || '1');
  const h = parseFloat(localStorage.getItem('bs-scale-h') || '1');
  const t = parseFloat(localStorage.getItem('bs-scale-t') || '1');
  document.getElementById('scaleW').value = Math.round(w * 100);
  document.getElementById('scaleH').value = Math.round(h * 100);
  document.getElementById('scaleT').value = Math.round(t * 100);
  document.getElementById('scaleWVal').textContent = Math.round(w * 100);
  document.getElementById('scaleHVal').textContent = Math.round(h * 100);
  document.getElementById('scaleTVal').textContent = Math.round(t * 100);
  document.documentElement.style.setProperty('--scale-w', w);
  document.documentElement.style.setProperty('--scale-h', h);
  document.documentElement.style.setProperty('--scale-t', t);
  document.body.classList.toggle('compact-btns', w < 0.8);
}

// ── Notion sync ──────────────────────────────────────────────
async function pullFromNotion() {
  setStatus('syncing', 'Pulling...');
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 30000);
    const res = await fetch('/api/pull', { signal: ctrl.signal }).catch(e => { clearTimeout(timer); throw new Error('Network error: ' + e.message); });
    clearTimeout(timer);
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error('Pull failed: ' + (e.error || res.status)); }
    videos = await res.json();
    // Ensure every segment has an id (old Notion data may predate the id field)
    videos.forEach(v => {
      (v.roadmap?.segments || []).forEach((s, i) => {
        if (!s.id) s.id = Date.now() + i + Math.random();
      });
    });
    buildFilter();
    render();
    history = [JSON.parse(JSON.stringify(videos))];
    historyIndex = 0;
    updateUndoRedoBtns();
    setStatus('saved', 'Loaded ' + videos.length + ' videos');
    setTimeout(() => setStatus('', 'Ready'), 2000);
  } catch (err) { setStatus('error', err.message); }
}
async function pushAllToNotion() {
  collectAll();
  setStatus('syncing', 'Pushing ' + videos.length + ' videos...');
  try {
    const res = await fetch('/api/push-all', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(videos)
    });
    if (!res.ok) throw new Error('Push failed');
    setStatus('saved', 'All saved to Notion!');
    setTimeout(() => setStatus('', 'Ready'), 2000);
  } catch (err) { setStatus('error', err.message); }
}
function setStatus(type, msg) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status' + (type ? ' ' + type : '');
  el.textContent = msg;
}

function videoCharCount(v) {
  return (v.roadmap?.segments || []).reduce((n, s) =>
    n + (s.title||'').length + (s.desc||'').length + (s.notes||'').length, 0);
}
function updateCharCount(vi) {
  let n = 0;
  document.querySelectorAll('.video-row[data-vi="' + vi + '"] .seg-title, .video-row[data-vi="' + vi + '"] .seg-desc, .video-row[data-vi="' + vi + '"] .seg-notes')
    .forEach(el => n += (el.value || '').length);
  const el = document.getElementById('cc-' + vi);
  if (el) el.textContent = n + ' chars';
}

function collectAll() {
  document.querySelectorAll('.video-row').forEach(row => {
    const vi = +row.dataset.vi;
    if (isNaN(vi) || !videos[vi]) return;
    const hookEl = row.querySelector('.video-hook');
    if (hookEl) videos[vi].hook = hookEl.value;
  });
  document.querySelectorAll('.seg:not(.mp-inline)').forEach(seg => {
    const vi    = +seg.dataset.vi;
    const segId = +seg.dataset.id;
    if (isNaN(vi) || !segId) return;
    const segs = videos[vi]?.roadmap?.segments;
    if (!segs) return;
    const s = segs.find(s => s.id === segId);
    if (!s) return;
    const titleEl = seg.querySelector('.seg-title');
    const descEl  = seg.querySelector('.seg-desc');
    const notesEl = seg.querySelector('.seg-notes');
    if (titleEl) s.title = titleEl.value;
    if (descEl)  s.desc  = descEl.value;
    if (notesEl) s.notes = notesEl.value;
    s.type = seg.dataset.type;
  });
  // Reorder roadmap.segments to match the current timeline so drag order is persisted
  videos.forEach(v => {
    if (!v.roadmap?.segments?.length) return;
    const tl = getTimeline(v);
    const segIds = tl.filter(i => i.k === 'seg').map(i => i.id);
    const segMap = Object.fromEntries(v.roadmap.segments.map(s => [s.id, s]));
    const inTimeline = new Set(segIds);
    v.roadmap.segments = [
      ...segIds.map(id => segMap[id]).filter(Boolean),
      ...v.roadmap.segments.filter(s => !inTimeline.has(s.id))
    ];
  });
}

function buildFilter() {
  const statuses = [...new Set(videos.map(v => v.status || '(none)'))].sort();
  const sel = document.getElementById('statusFilter');
  sel.innerHTML = '<option value="">All (' + videos.length + ')</option>' +
    statuses.map(s => {
      const c = videos.filter(v => (v.status||'(none)') === s).length;
      return '<option value="' + esc(s) + '">' + esc(s) + ' (' + c + ')</option>';
    }).join('');
  document.getElementById('statusCounts').innerHTML = statuses.map(s => {
    const c = videos.filter(v => (v.status||'(none)') === s).length;
    return '<span class="status-count" onclick="document.getElementById(\'statusFilter\').value=\'' + esc(s) + '\';applyFilter()">' + esc(s) + ': ' + c + '</span>';
  }).join('');
}

let hideNotPursuing = false;
function toggleHideNotPursuing() {
  hideNotPursuing = !hideNotPursuing;
  document.getElementById('hideNotPursuingBtn').classList.toggle('btn-active', hideNotPursuing);
  applyFilter();
}

function applyFilter() {
  const f = document.getElementById('statusFilter').value;
  document.querySelectorAll('.video-row').forEach(row => {
    const status = row.dataset.status || '';
    const filteredOut = f && status !== f;
    const notPursuing = hideNotPursuing && status.toLowerCase() === 'not pursuing';
    row.classList.toggle('hidden', filteredOut || notPursuing);
  });
  const vis = document.querySelectorAll('.video-row:not(.hidden)').length;
  document.getElementById('count').textContent = (f || hideNotPursuing) ? vis + ' of ' + videos.length : videos.length + ' videos';
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const c = document.getElementById('videos');
  if (!videos.length) {
    c.innerHTML = '<div class="empty"><h2>No videos</h2><p>Make sure some cards have "Beat Sheetin" checked</p></div>';
    return;
  }

  // Preserve which media panels are open
  const openPanels = {};
  document.querySelectorAll('.mp-body.open').forEach(el => {
    openPanels[el.id.replace('mpb-','')] = true;
  });

  c.innerHTML = videos.map((v, vi) =>
    '<div class="video-row" data-vi="' + vi + '" data-status="' + esc(v.status || '(none)') + '">' +
      '<div class="video-row-main">' +
        '<div class="video-info">' +
          '<div class="video-meta"><span class="video-num">#' + (vi+1) + '</span><span class="video-status">' + esc(v.status||'-') + '</span></div>' +
          '<textarea class="video-title" placeholder="Title..." oninput="autoResize(this)">' + esc(v.title) + '</textarea>' +
          '<div class="video-info-row">' +
            (v.videoUrl ? '<a class="url-btn" href="' + esc(v.videoUrl) + '" target="_blank" rel="noopener">URL</a>' : '<span class="url-btn" style="opacity:0.4;cursor:default">no url</span>') +
            '<span class="char-count" id="cc-' + vi + '">' + videoCharCount(v) + ' chars</span>' +
          '</div>' +
          '<textarea class="video-hook" placeholder="No hook" oninput="autoResize(this)">' + esc(v.hook || '') + '</textarea>' +
        '</div>' +
        '<div class="segments" data-vi="' + vi + '">' +
          getTimeline(v).map(item => {
            if (item.k === 'seg') {
              const si = (v.roadmap?.segments || []).findIndex(s => s.id === item.id);
              return si >= 0 ? renderSeg(vi, si, v.roadmap.segments[si]) : '';
            }
            const m = (v.mediaIndex || []).find(m => m.r2_key === item.r2);
            return m ? renderMediaInline(vi, m) : '';
          }).join('<span class="arrow">&#8594;</span>') +
          '<div class="add-seg" onclick="addSeg(' + vi + ')">+</div>' +
        '</div>' +
      '</div>' +
      renderMediaPanel(v, vi) +
    '</div>'
  ).join('');

  // Restore open panels
  Object.keys(openPanels).forEach(vi => {
    const body = document.getElementById('mpb-' + vi);
    const arrow = document.getElementById('mpa-' + vi);
    if (body) { body.classList.add('open'); body.style.display = 'flex'; }
    if (arrow) arrow.textContent = '&#9662;';
  });

  applyFilter();
  setupDrag();
  setupCardSelect();
  setupHoverTracking();
  if (wrapMode) setupWrapResize();
  document.querySelectorAll('.video-title, .video-hook').forEach(autoResize);
}

function renderSeg(vi, si, s) {
  const titleHtml = wrapMode
    ? '<textarea class="seg-title seg-ta" placeholder="Title..." oninput="autoResize(this);updateCharCount(' + vi + ')">' + esc(s.title) + '</textarea>'
    : '<input class="seg-title" value="' + esc(s.title) + '" placeholder="Title..." oninput="updateCharCount(' + vi + ')">';

  const notesHtml = wrapMode
    ? '<textarea class="seg-notes seg-ta" placeholder="Notes..." oninput="autoResize(this);updateCharCount(' + vi + ')">' + esc(s.notes) + '</textarea>'
    : '<input class="seg-notes" value="' + esc(s.notes) + '" placeholder="Notes..." oninput="updateCharCount(' + vi + ')">';

  // seg-desc: always a textarea; rows=3 in normal mode, auto-resize in wrap mode
  const descAttrs = wrapMode
    ? 'oninput="autoResize(this);updateCharCount(' + vi + ')"'
    : 'rows="3" oninput="updateCharCount(' + vi + ')"';

  return '<div class="seg ' + s.type + '" data-type="' + s.type + '" data-vi="' + vi + '" data-si="' + si + '" data-id="' + s.id + '" draggable="true">' +
    '<div class="seg-header">' +
      '<select class="seg-type" onchange="chgType(this)">' +
        TYPES.map(t => '<option value="' + t + '"' + (t === s.type ? ' selected' : '') + '>' + t.replace(/-/g,' ').toUpperCase() + '</option>').join('') +
      '</select>' +
      '<div class="seg-controls">' +
        '<button class="seg-btn" onclick="moveSeg(' + vi + ',' + si + ',-1)" title="Left">&#8592;</button>' +
        '<button class="seg-btn" onclick="moveSeg(' + vi + ',' + si + ',1)"  title="Right">&#8594;</button>' +
        '<button class="seg-btn" onclick="copySeg(' + vi + ',' + si + ')"    title="Copy">&#x2398;</button>' +
        '<button class="seg-btn" onclick="pasteSeg(' + vi + ',' + si + ')"   title="Paste">&#x2397;</button>' +
        '<button class="seg-btn delete" onclick="delSeg(' + vi + ',' + si + ')" title="Delete">&#215;</button>' +
      '</div>' +
      '<button class="seg-btn seg-menu-btn" onclick="toggleMenu(this,event,' + vi + ',' + si + ')" title="Actions">&#8942;</button>' +
    '</div>' +
    titleHtml +
    '<textarea class="seg-desc" placeholder="Description..." ' + descAttrs + '>' + esc(s.desc) + '</textarea>' +
    notesHtml +
  '</div>';
}

function renderMediaInline(vi, m) {
  const r2 = esc(m.r2_key);
  const controls =
    '<div class="mp-inline-controls">' +
      '<button class="seg-btn" onclick="moveMedia(' + vi + ',\'' + r2 + '\',-1);event.stopPropagation()" title="Left">&#8592;</button>' +
      '<button class="seg-btn" onclick="moveMedia(' + vi + ',\'' + r2 + '\',1);event.stopPropagation()" title="Right">&#8594;</button>' +
      '<button class="seg-btn delete" data-vi="' + vi + '" data-r2="' + r2 + '" onclick="removeMediaFromRow(this);event.stopPropagation()" title="Remove from row">&#215;</button>' +
    '</div>';
  let inner = '';
  if (m.kind === 'image') {
    inner = '<img class="mp-inline-thumb" src="' + esc(m.public_url) + '" onclick="previewImg(this.src);event.stopPropagation()" title="' + esc(m.filename||'') + '">';
  } else if (m.kind === 'audio') {
    inner = '<div class="mp-inline-icon">&#127925;</div><span class="mp-inline-label">' + esc(m.filename||'audio') + '</span>';
  } else {
    inner = '<div class="mp-inline-icon">&#127909;</div><span class="mp-inline-label">' + esc(m.filename||'video') + '</span>';
  }
  return '<div class="seg mp-inline" data-vi="' + vi + '" data-r2="' + r2 + '" draggable="true">' + controls + inner + '</div>';
}

// ── Media panel ──────────────────────────────────────────────
function renderMediaPanel(v, vi) {
  const items = v.mediaIndex || [];
  const imgCnt   = items.filter(m => m.kind === 'image').length;
  const audioCnt = items.filter(m => m.kind === 'audio').length;
  const vidCnt   = items.filter(m => m.kind === 'video').length;
  const parts = [];
  if (imgCnt)   parts.push(imgCnt   + ' image' + (imgCnt   > 1 ? 's' : ''));
  if (audioCnt) parts.push(audioCnt + ' audio');
  if (vidCnt)   parts.push(vidCnt   + ' video' + (vidCnt   > 1 ? 's' : ''));
  const countStr = parts.join(' &middot; ') || '';

  const bodyHtml = items.length
    ? items.map(m => renderMediaItem(m, vi)).join('')
    : '<span class="mp-empty">No media yet. Add images, audio, or video below.</span>';

  const pid = esc(v.id);
  return '<div class="media-panel" id="mp-' + vi + '">' +
    '<div class="mp-header" onclick="toggleMediaPanel(' + vi + ')">' +
      '<span class="mp-arrow" id="mpa-' + vi + '">&#9658;</span>' +
      '<span class="mp-label">Media</span>' +
      (countStr ? '<span class="mp-count">' + countStr + '</span>' : '') +
      '<div class="mp-actions" onclick="event.stopPropagation()">' +
        '<button class="btn mp-btn" onclick="openDraw(' + vi + ')">&#9998; Draw</button>' +
        '<button class="btn mp-btn" onclick="openImageEdit(' + vi + ')">&#128444; Image</button>' +
        '<button class="btn mp-btn mp-btn-record" id="recbtn-' + vi + '" onclick="startRecord(' + vi + ')">&#9210; Record</button>' +
        '<button class="btn mp-btn" onclick="uploadFile(' + vi + ',0)">&#8593; Audio</button>' +
        '<button class="btn mp-btn" onclick="uploadFile(' + vi + ',1)">&#127909; Video</button>' +
      '</div>' +
    '</div>' +
    '<div class="mp-body" id="mpb-' + vi + '">' + bodyHtml + '</div>' +
  '</div>';
}

function renderMediaItem(m, vi) {
  const r2  = esc(m.r2_key);
  const bid = esc(m.block_id || 'unknown');
  const del = '<button class="mp-del" title="Delete" data-vi="' + vi + '" data-r2="' + r2 + '" data-bid="' + bid + '" onclick="deleteMedia(this)">&#215;</button>';
  const dragAttr = 'draggable="true" data-vi="' + vi + '" data-r2="' + r2 + '"';

  if (m.kind === 'image') {
    return '<div class="mp-item" ' + dragAttr + '>' +
      '<img class="mp-thumb" src="' + esc(m.public_url) + '" loading="lazy" title="' + esc(m.filename||'') + '" onclick="previewImg(this.src)">' +
      del + '</div>';
  }
  if (m.kind === 'audio') {
    return '<div class="mp-item mp-item-audio" ' + dragAttr + '>' +
      '<audio controls src="' + esc(m.public_url) + '" style="height:32px;max-width:220px"></audio>' +
      '<span class="mp-filename">' + esc(m.filename || 'audio') + '</span>' +
      del + '</div>';
  }
  if (m.kind === 'video') {
    return '<div class="mp-item mp-item-video" ' + dragAttr + '>' +
      '<video controls src="' + esc(m.public_url) + '" style="max-height:130px;max-width:200px" preload="metadata"></video>' +
      (m.description ? '<p class="mp-vid-desc">' + esc(m.description) + '</p>' : '') +
      del + '</div>';
  }
  return '';
}

function toggleMediaPanel(vi) {
  const body  = document.getElementById('mpb-' + vi);
  const arrow = document.getElementById('mpa-' + vi);
  if (!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  body.style.display = isOpen ? 'none' : 'flex';
  if (arrow) arrow.innerHTML = isOpen ? '&#9658;' : '&#9662;';
}

function refreshMediaPanelDOM(vi) {
  const old = document.getElementById('mp-' + vi);
  if (!old) return;
  const wasOpen = document.getElementById('mpb-' + vi)?.classList.contains('open');
  const tmp = document.createElement('div');
  tmp.innerHTML = renderMediaPanel(videos[vi], vi);
  old.replaceWith(tmp.firstChild);
  if (wasOpen) {
    const body  = document.getElementById('mpb-' + vi);
    const arrow = document.getElementById('mpa-' + vi);
    if (body)  { body.classList.add('open'); body.style.display = 'flex'; }
    if (arrow) arrow.innerHTML = '&#9662;';
  }
}

// ── Media upload helpers ─────────────────────────────────────
async function getUploadUrl(pageId, filename, kind) {
  const res = await fetch('/api/upload-url', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ notion_id: pageId, filename, kind })
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'Upload URL request failed'); }
  return res.json();
}
async function doUpload(blob, uploadUrl, contentType) {
  const res = await fetch(uploadUrl, { method: 'PUT', body: blob, headers: { 'Content-Type': contentType || blob.type || 'application/octet-stream' } });
  if (!res.ok) throw new Error('Upload to R2 failed (' + res.status + ')');
}
async function confirmUpload(data) {
  const res = await fetch('/api/confirm-upload', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'Confirm upload failed'); }
  return res.json();
}

// Generic file upload (audio or video — images go through the editor)
function uploadFile(vi, kindCode) {
  const kind = kindCode === 0 ? 'audio' : 'video';
  const pageId = videos[vi].id;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = kind === 'audio' ? 'audio/*' : 'video/*';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    setStatus('syncing', 'Uploading ' + kind + '...');
    try {
      const { uploadUrl, publicUrl, r2_key } = await getUploadUrl(pageId, file.name, kind);
      await doUpload(file, uploadUrl, file.type);
      let description = '';
      if (kind === 'video') description = window.prompt('Add a description for this video (optional):') || '';
      const { block_id } = await confirmUpload({ notion_id: pageId, r2_key, public_url: publicUrl, kind, filename: file.name, description });
      if (!videos[vi].mediaIndex) videos[vi].mediaIndex = [];
      videos[vi].mediaIndex.push({ r2_key, block_id, kind, filename: file.name, description, public_url: publicUrl });
      refreshMediaPanelDOM(vi);
      const body = document.getElementById('mpb-' + vi);
      if (body && !body.classList.contains('open')) toggleMediaPanel(vi);
      setStatus('saved', kind.charAt(0).toUpperCase() + kind.slice(1) + ' uploaded!');
      setTimeout(() => setStatus('', 'Ready'), 2000);
    } catch (err) { setStatus('error', err.message); }
  };
  input.click();
}

async function deleteMedia(btn) {
  const vi      = +btn.dataset.vi;
  const r2_key  = btn.dataset.r2;
  const block_id = btn.dataset.bid;
  if (!confirm('Delete this media item?')) return;
  const pageId = videos[vi].id;
  try {
    const res = await fetch('/api/delete-media', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notion_id: pageId, r2_key, block_id })
    });
    if (!res.ok) throw new Error('Delete failed');
    videos[vi].mediaIndex = (videos[vi].mediaIndex || []).filter(m => m.r2_key !== r2_key);
    videos[vi].timeline = getTimeline(videos[vi]).filter(item => !(item.k === 'media' && item.r2 === r2_key));
    render();
    refreshMediaPanelDOM(vi);
  } catch (err) { setStatus('error', err.message); }
}

// ── Audio recording ──────────────────────────────────────────
let mediaRecorder = null;
let audioChunks   = [];
let recCtx        = null;  // { pageId, vi }

async function startRecord(vi) {
  if (mediaRecorder && mediaRecorder.state === 'recording') { stopRecord(); return; }
  const pageId = videos[vi].id;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks  = [];
    recCtx       = { pageId, vi };
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      document.getElementById('rec-indicator').classList.remove('show');
      const btn = document.getElementById('recbtn-' + recCtx.vi);
      if (btn) btn.classList.remove('recording');

      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const filename = 'recording-' + Date.now() + '.webm';
      setStatus('syncing', 'Uploading audio...');
      try {
        const { uploadUrl, publicUrl, r2_key } = await getUploadUrl(recCtx.pageId, filename, 'audio');
        await doUpload(blob, uploadUrl, 'audio/webm');
        const { block_id } = await confirmUpload({ notion_id: recCtx.pageId, r2_key, public_url: publicUrl, kind: 'audio', filename });
        if (!videos[recCtx.vi].mediaIndex) videos[recCtx.vi].mediaIndex = [];
        videos[recCtx.vi].mediaIndex.push({ r2_key, block_id, kind: 'audio', filename, description: '', public_url: publicUrl });
        const curVi = recCtx.vi;
        refreshMediaPanelDOM(curVi);
        const body = document.getElementById('mpb-' + curVi);
        if (body && !body.classList.contains('open')) toggleMediaPanel(curVi);
        setStatus('saved', 'Audio saved!');
        setTimeout(() => setStatus('', 'Ready'), 2000);
      } catch (err) { setStatus('error', err.message); }
      mediaRecorder = null; recCtx = null;
    };
    mediaRecorder.start();
    document.getElementById('rec-indicator').classList.add('show');
    const btn = document.getElementById('recbtn-' + vi);
    if (btn) btn.classList.add('recording');
  } catch (err) { alert('Microphone access denied: ' + err.message); }
}
function stopRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
}

// ── Drawing canvas (Fabric.js) ────────────────────────────────
let fabricCanvas = null;
let editorCtx    = null;
let drawTool     = 'pen';
let drawHistory  = [], drawHistIdx = -1;
let drawStart    = null, activeShape = null;
let editorClipboard = null;
let isPanning = false, panLastX = 0, panLastY = 0;
let erasePoints = [], isErasing = false;
let eraserMode = 'pixel';

function getCanvasPos(e) {
  var b = fabricCanvas.upperCanvasEl.getBoundingClientRect();
  var vt = fabricCanvas.viewportTransform;
  return { x: (e.clientX - b.left - vt[4]) / vt[0], y: (e.clientY - b.top - vt[5]) / vt[3] };
}
function setEraserMode(mode) {
  eraserMode = mode;
  document.getElementById('erase-mode-pixel').classList.toggle('active', mode === 'pixel');
  document.getElementById('erase-mode-object').classList.toggle('active', mode === 'object');
}
function applyObjectErase() {
  if (!erasePoints.length || !fabricCanvas) return;
  var w = +document.getElementById('draw-width').value;
  var objs = fabricCanvas.getObjects().filter(function(o) { return !o._isBackground; });
  var toRemove = [];
  erasePoints.forEach(function(pt) {
    objs.forEach(function(o) {
      if (toRemove.indexOf(o) === -1) {
        var r = o.getBoundingRect(true);
        if (pt.x + w >= r.left && pt.x - w <= r.left + r.width &&
            pt.y + w >= r.top  && pt.y - w <= r.top  + r.height) {
          toRemove.push(o);
        }
      }
    });
  });
  toRemove.forEach(function(o) { fabricCanvas.remove(o); });
  fabricCanvas.discardActiveObject();
  fabricCanvas.renderAll();
  if (toRemove.length > 0) saveDrawState();
  erasePoints = []; isErasing = false;
}

function rasterizeCanvas(callback) {
  var savedVT = fabricCanvas.viewportTransform.slice();
  fabricCanvas.setViewportTransform([1,0,0,1,0,0]);
  fabricCanvas.renderAll();
  var lc = fabricCanvas.lowerCanvasEl;
  var snap = lc.toDataURL();
  fabricCanvas.setViewportTransform(savedVT);
  fabricCanvas.getObjects().slice().forEach(function(o) { fabricCanvas.remove(o); });
  var bgImg = new Image();
  bgImg.onload = function() {
    var fImg = new fabric.Image(bgImg, {
      left: 0, top: 0,
      scaleX: fabricCanvas.getWidth() / bgImg.naturalWidth,
      scaleY: fabricCanvas.getHeight() / bgImg.naturalHeight,
      selectable: false, evented: false, _isBackground: true
    });
    fabricCanvas.backgroundColor = '#ffffff';
    fabricCanvas.add(fImg);
    fabricCanvas.sendToBack(fImg);
    if (callback) callback(lc);
    fabricCanvas.renderAll();
    saveDrawState();
  };
  bgImg.src = snap;
}

function computeBBox() {
  var minX = 0, minY = 0, maxX = fabricCanvas.getWidth(), maxY = fabricCanvas.getHeight();
  fabricCanvas.getObjects().forEach(function(o) {
    var r = o.getBoundingRect(false, true);
    if (r.left < minX) minX = Math.floor(r.left) - 2;
    if (r.top  < minY) minY = Math.floor(r.top)  - 2;
    if (r.left + r.width  > maxX) maxX = Math.ceil(r.left + r.width)  + 2;
    if (r.top  + r.height > maxY) maxY = Math.ceil(r.top  + r.height) + 2;
  });
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
}
function canvasSnapshot() {
  var b = computeBBox();
  return { cvs: fabricCanvas.toCanvasElement(1, { left: b.x, top: b.y, width: b.w, height: b.h }), ox: b.x, oy: b.y };
}
function canvasBgSnapshot() {
  // Same bounding box as canvasSnapshot but renders only background objects.
  // Used by flood fill so vector objects stay as live Fabric objects after fill.
  var b = computeBBox();
  var nonBg = fabricCanvas.getObjects().filter(function(o){ return !o._isBackground; });
  nonBg.forEach(function(o){ o.visible = false; });
  var cvs = fabricCanvas.toCanvasElement(1, { left: b.x, top: b.y, width: b.w, height: b.h });
  nonBg.forEach(function(o){ o.visible = true; });
  return { cvs: cvs, ox: b.x, oy: b.y };
}
function applySnapshot(snap, savedVT, flattenAll) {
  var cvs = snap.cvs || snap;
  var ox = snap.ox || 0, oy = snap.oy || 0;
  fabricCanvas.setViewportTransform(savedVT);
  if (flattenAll) {
    fabricCanvas.getObjects().slice().forEach(function(o){ fabricCanvas.remove(o); });
  } else {
    fabricCanvas.getObjects().filter(function(o){ return o._isBackground; }).forEach(function(o){ fabricCanvas.remove(o); });
  }
  var bgImg = new Image();
  bgImg.onload = function() {
    var fImg = new fabric.Image(bgImg, { left: ox, top: oy, selectable:false, evented:false, _isBackground:true });
    fabricCanvas.backgroundColor = '#ffffff';
    fabricCanvas.add(fImg);
    fabricCanvas.sendToBack(fImg);
    fabricCanvas.renderAll();
    saveDrawState();
  };
  bgImg.src = cvs.toDataURL();
}

function floodFill(e) {
  if (!fabricCanvas) return;
  var savedVT = fabricCanvas.viewportTransform.slice();
  var bounds = fabricCanvas.upperCanvasEl.getBoundingClientRect();
  var px = Math.round((e.clientX - bounds.left - savedVT[4]) / savedVT[0]);
  var py = Math.round((e.clientY - bounds.top  - savedVT[5]) / savedVT[3]);
  fabricCanvas.setViewportTransform([1,0,0,1,0,0]);
  // Pass 1: full snapshot (all objects) — used only to determine BFS boundaries
  var fullSnap = canvasSnapshot();
  var off = fullSnap.cvs, ox = fullSnap.ox, oy = fullSnap.oy;
  var w = off.width, h = off.height;
  var spx = px - ox, spy = py - oy;
  if (spx < 0 || spy < 0 || spx >= w || spy >= h) { fabricCanvas.setViewportTransform(savedVT); return; }
  var ctx = off.getContext('2d');
  var id = ctx.getImageData(0, 0, w, h), d = id.data;
  var s = (spy*w+spx)*4, tR=d[s], tG=d[s+1], tB=d[s+2];
  var hex = document.getElementById('draw-color').value;
  var fR=parseInt(hex.slice(1,3),16), fG=parseInt(hex.slice(3,5),16), fB=parseInt(hex.slice(5,7),16);
  if (tR===fR && tG===fG && tB===fB) { fabricCanvas.setViewportTransform(savedVT); return; }
  var tol=30;
  function hit(i){return Math.abs(d[i]-tR)<=tol&&Math.abs(d[i+1]-tG)<=tol&&Math.abs(d[i+2]-tB)<=tol;}
  var q=new Int32Array(w*h), qh=0, qt=0, vis=new Uint8Array(w*h);
  q[qt++]=spx+spy*w; vis[spx+spy*w]=1;
  while(qh<qt){
    var pos=q[qh++], cx=pos%w, cy=(pos/w)|0, i4=pos*4;
    d[i4]=fR;d[i4+1]=fG;d[i4+2]=fB;d[i4+3]=255;
    if(cx>0   &&!vis[pos-1] &&hit((pos-1)*4)){vis[pos-1]=1;q[qt++]=pos-1;}
    if(cx<w-1 &&!vis[pos+1] &&hit((pos+1)*4)){vis[pos+1]=1;q[qt++]=pos+1;}
    if(cy>0   &&!vis[pos-w] &&hit((pos-w)*4)){vis[pos-w]=1;q[qt++]=pos-w;}
    if(cy<h-1 &&!vis[pos+w] &&hit((pos+w)*4)){vis[pos+w]=1;q[qt++]=pos+w;}
  }
  // Pass 2: background-only snapshot — apply fill pixels here so vector objects stay live
  var bgSnap = canvasBgSnapshot();
  var bgCtx = bgSnap.cvs.getContext('2d');
  var bgId = bgCtx.getImageData(0, 0, w, h), bgD = bgId.data;
  for (var vi = 0; vi < vis.length; vi++) {
    if (vis[vi]) { bgD[vi*4]=fR; bgD[vi*4+1]=fG; bgD[vi*4+2]=fB; bgD[vi*4+3]=255; }
  }
  bgCtx.putImageData(bgId, 0, 0);
  applySnapshot(bgSnap, savedVT, false);  // only replace background; keep vector objects
}

function applyErase() {
  if (eraserMode === 'object') { applyObjectErase(); return; }
  if (!erasePoints.length || !fabricCanvas) return;
  var brushW = +document.getElementById('draw-width').value;
  var savedVT = fabricCanvas.viewportTransform.slice();
  fabricCanvas.setViewportTransform([1,0,0,1,0,0]);
  var snap = canvasSnapshot();
  var off = snap.cvs, ox = snap.ox, oy = snap.oy;
  var ctx = off.getContext('2d');
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = 'rgba(0,0,0,1)';
  ctx.strokeStyle = 'rgba(0,0,0,1)';
  ctx.lineWidth = brushW * 2;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (erasePoints.length === 1) {
    ctx.beginPath(); ctx.arc(erasePoints[0].x - ox, erasePoints[0].y - oy, brushW, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.moveTo(erasePoints[0].x - ox, erasePoints[0].y - oy);
    for (var i=1; i<erasePoints.length; i++) ctx.lineTo(erasePoints[i].x - ox, erasePoints[i].y - oy);
    ctx.stroke();
  }
  erasePoints = []; isErasing = false;
  applySnapshot(snap, savedVT, true);  // pixel erase flattens — expected for pixel-level op
}

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha.toFixed(2) + ')';
}

function setDrawTool(tool) {
  var prev = drawTool;
  drawTool = tool;
  document.querySelectorAll('.etool-btn[id^="etool-"]').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('etool-' + tool);
  if (btn) btn.classList.add('active');
  var modeGroup = document.getElementById('eraser-mode-group');
  if (modeGroup) modeGroup.classList.toggle('visible', tool === 'eraser');
  var textGroup = document.getElementById('text-options-group');
  if (textGroup) textGroup.classList.toggle('visible', tool === 'text');
  if (!fabricCanvas) return;
  if (prev === 'select' && tool !== 'select') {
    fabricCanvas.discardActiveObject();
    fabricCanvas.getObjects().forEach(function(o) { o.set({ selectable: false, lockMovementX: true, lockMovementY: true }); });
    fabricCanvas.selection = false;
    fabricCanvas.renderAll();
  }
  fabricCanvas.isDrawingMode = (tool === 'pen');
  fabricCanvas.selection = (tool === 'select');
  fabricCanvas.defaultCursor = tool === 'select' ? 'grab' : tool === 'fill' ? 'cell' : tool === 'text' ? 'text' : 'crosshair';
  if (tool === 'select') {
    fabricCanvas.getObjects().forEach(function(o) { o.set({ selectable: true, evented: true, lockMovementX: false, lockMovementY: false }); });
    fabricCanvas.renderAll();
  }
  updateDrawBrush();
}

function updateDrawBrush() {
  var w  = +document.getElementById('draw-width').value;
  var op = +document.getElementById('draw-opacity').value;
  document.getElementById('draw-width-val').textContent   = w;
  document.getElementById('draw-opacity-val').textContent = op + '%';
  if (!fabricCanvas) return;
  var col = document.getElementById('draw-color').value;
  fabricCanvas.freeDrawingBrush.color = op < 100 ? hexToRgba(col, op / 100) : col;
  fabricCanvas.freeDrawingBrush.width = w;
  var obj = fabricCanvas.getActiveObject();
  if (obj && (obj.type === 'i-text' || obj.type === 'text')) {
    obj.set('fill', col);
    fabricCanvas.renderAll();
  }
}

function updateTextStyle() {
  var fSize = +(document.getElementById('text-size').value) || 24;
  var fFamily = document.getElementById('text-font').value || 'Georgia';
  document.getElementById('text-size-val').value = fSize;
  if (!fabricCanvas) return;
  var obj = fabricCanvas.getActiveObject();
  if (obj && (obj.type === 'i-text' || obj.type === 'text')) {
    obj.set({ fontSize: fSize, fontFamily: fFamily });
    fabricCanvas.renderAll();
  }
}

function saveDrawState() {
  if (!fabricCanvas) return;
  drawHistory = drawHistory.slice(0, drawHistIdx + 1);
  drawHistory.push(JSON.stringify(fabricCanvas.toJSON()));
  if (drawHistory.length > 50) drawHistory.shift();
  drawHistIdx = drawHistory.length - 1;
}

function undoDraw() {
  if (!fabricCanvas || drawHistIdx <= 0) return;
  drawHistIdx--;
  fabricCanvas.loadFromJSON(JSON.parse(drawHistory[drawHistIdx]), function() { fabricCanvas.renderAll(); });
}

function redoDraw() {
  if (!fabricCanvas || drawHistIdx >= drawHistory.length - 1) return;
  drawHistIdx++;
  fabricCanvas.loadFromJSON(JSON.parse(drawHistory[drawHistIdx]), function() { fabricCanvas.renderAll(); });
}

function clearDraw() {
  if (!fabricCanvas) return;
  fabricCanvas.getObjects().slice().forEach(function(o) { fabricCanvas.remove(o); });
  fabricCanvas.backgroundColor = '#ffffff';
  fabricCanvas.renderAll();
  saveDrawState();
}

function openDraw(vi) { initEditor(null, videos[vi].id, vi); }

function openImageEdit(vi) {
  var input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = function(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) { initEditor(ev.target.result, videos[vi].id, vi); };
    reader.readAsDataURL(file);
  };
  input.click();
}

function initEditor(imgDataUrl, pageId, vi) {
  if (typeof fabric === 'undefined') { alert('Drawing tools loading — try again in a moment.'); return; }
  editorCtx = { pageId: pageId, vi: vi };
  document.getElementById('editor-modal').classList.add('open');
  if (fabricCanvas) { try { fabricCanvas.dispose(); } catch {} fabricCanvas = null; }
  drawHistory = []; drawHistIdx = -1; activeShape = null; drawStart = null; isPanning = false; erasePoints = []; isErasing = false;

  var wrap = document.getElementById('draw-canvas-wrap');
  var w = wrap.clientWidth || 1100;
  var h = wrap.clientHeight || 640;

  fabricCanvas = new fabric.Canvas('draw-canvas', { backgroundColor: '#ffffff', selection: false });
  fabricCanvas.setWidth(w);
  fabricCanvas.setHeight(h);
  fabricCanvas.clipPath = new fabric.Rect({ left: 0, top: 0, width: w, height: h, absolutePositioned: true });
  updateDrawBrush();
  setDrawTool('pen');
  var zs = document.getElementById('draw-zoom'), zv = document.getElementById('draw-zoom-val');
  if (zs) zs.value = 100; if (zv) zv.value = 100;

  if (imgDataUrl) {
    fabric.Image.fromURL(imgDataUrl, function(img) {
      var scale = Math.min(w / img.width, h / img.height, 1);
      img.set({ left: 0, top: 0, scaleX: scale, scaleY: scale, selectable: false, evented: false });
      fabricCanvas.add(img);
      fabricCanvas.sendToBack(img);
      fabricCanvas.renderAll();
      saveDrawState();
    });
  } else {
    saveDrawState();
  }

  fabricCanvas.on('mouse:down', function(opt) {
    if (drawTool === 'pen') return;
    if (drawTool === 'eraser') { isErasing = true; erasePoints = [getCanvasPos(opt.e)]; return; }
    if (drawTool === 'select') {
      if (!opt.target && !opt.e.shiftKey) {
        isPanning = true; panLastX = opt.e.clientX; panLastY = opt.e.clientY;
        fabricCanvas.defaultCursor = 'grabbing';
      }
      return;
    }
    if (drawTool === 'fill') { floodFill(opt.e); return; }
    if (drawTool === 'text') {
      if (opt.target && (opt.target.type === 'i-text')) return;
      var p0 = fabricCanvas.getPointer(opt.e);
      var col0 = document.getElementById('draw-color').value;
      var fSize = +(document.getElementById('text-size').value) || 24;
      var fFamily = document.getElementById('text-font').value || 'Georgia';
      var txt = new fabric.IText('', {
        left: p0.x, top: p0.y,
        fontFamily: fFamily, fontSize: fSize,
        fill: col0, selectable: true, evented: true,
        lockMovementX: false, lockMovementY: false
      });
      fabricCanvas.add(txt);
      fabricCanvas.setActiveObject(txt);
      txt.enterEditing();
      fabricCanvas.renderAll();
      txt.on('editing:exited', function() {
        if (!txt.text || !txt.text.trim()) { fabricCanvas.remove(txt); }
        fabricCanvas.renderAll();
        saveDrawState();
      });
      return;
    }
    var p   = fabricCanvas.getPointer(opt.e);
    drawStart = { x: p.x, y: p.y };
    var col = document.getElementById('draw-color').value;
    var wid = +document.getElementById('draw-width').value;
    var op  = +document.getElementById('draw-opacity').value / 100;
    if (drawTool === 'rect')   activeShape = new fabric.Rect({ left: p.x, top: p.y, width: 0, height: 0, fill: 'transparent', stroke: col, strokeWidth: wid, opacity: op, selectable: false, evented: true, lockMovementX: true, lockMovementY: true });
    if (drawTool === 'circle') activeShape = new fabric.Ellipse({ left: p.x, top: p.y, rx: 0, ry: 0, fill: 'transparent', stroke: col, strokeWidth: wid, opacity: op, selectable: false, evented: true, lockMovementX: true, lockMovementY: true });
    if (drawTool === 'line')   activeShape = new fabric.Line([p.x, p.y, p.x, p.y], { stroke: col, strokeWidth: wid, opacity: op, selectable: false, evented: true, lockMovementX: true, lockMovementY: true });
    if (activeShape) fabricCanvas.add(activeShape);
  });

  fabricCanvas.on('mouse:move', function(opt) {
    if (drawTool === 'eraser') { if ((opt.e.buttons & 1) && isErasing) erasePoints.push(getCanvasPos(opt.e)); return; }
    if (isPanning) {
      var dx = opt.e.clientX - panLastX, dy = opt.e.clientY - panLastY;
      fabricCanvas.relativePan({ x: dx, y: dy });
      panLastX = opt.e.clientX; panLastY = opt.e.clientY; return;
    }
    if (!activeShape || !drawStart) return;
    var p = fabricCanvas.getPointer(opt.e);
    var dx = p.x - drawStart.x, dy = p.y - drawStart.y;
    if (opt.e.shiftKey) {
      if (drawTool === 'rect' || drawTool === 'circle') { var s = Math.min(Math.abs(dx), Math.abs(dy)); dx = Math.sign(dx)*s; dy = Math.sign(dy)*s; }
      else if (drawTool === 'line') { var ang = Math.round(Math.atan2(dy, dx)/(Math.PI/4))*(Math.PI/4); var len = Math.sqrt(dx*dx+dy*dy); dx = Math.cos(ang)*len; dy = Math.sin(ang)*len; }
    }
    if (drawTool === 'rect')   activeShape.set({ width: Math.abs(dx), height: Math.abs(dy), left: dx<0?drawStart.x+dx:drawStart.x, top: dy<0?drawStart.y+dy:drawStart.y });
    if (drawTool === 'circle') activeShape.set({ rx: Math.abs(dx)/2, ry: Math.abs(dy)/2, left: dx<0?drawStart.x+dx:drawStart.x, top: dy<0?drawStart.y+dy:drawStart.y });
    if (drawTool === 'line')   activeShape.set({ x2: drawStart.x+dx, y2: drawStart.y+dy });
    fabricCanvas.renderAll();
  });

  fabricCanvas.on('mouse:up', function() {
    if (isErasing) { applyErase(); return; }
    if (isPanning) { isPanning = false; fabricCanvas.defaultCursor = 'grab'; return; }
    if (activeShape) { activeShape.set({ selectable: false, evented: true, lockMovementX: true, lockMovementY: true }); activeShape = null; drawStart = null; fabricCanvas.renderAll(); saveDrawState(); }
  });

  fabricCanvas.on('mouse:wheel', function(opt) {
    var e = opt.e;
    var zoom = fabricCanvas.getZoom() * (e.deltaY > 0 ? 0.9 : 1.1);
    zoom = Math.min(4, Math.max(0.25, zoom));
    fabricCanvas.zoomToPoint(new fabric.Point(e.offsetX, e.offsetY), zoom);
    var pct = Math.round(zoom * 100);
    var zs = document.getElementById('draw-zoom'), zv = document.getElementById('draw-zoom-val');
    if (zs) zs.value = pct; if (zv) zv.value = pct;
    e.preventDefault(); e.stopPropagation();
  });

  fabricCanvas.on('path:created', function(e) {
    if (e.path) e.path.set({ selectable: false, evented: true, lockMovementX: true, lockMovementY: true });
    saveDrawState();
  });
  document.addEventListener('keydown', onDrawKey);
}

function deleteSelected() {
  if (!fabricCanvas) return;
  var objs = fabricCanvas.getActiveObjects();
  if (objs && objs.length) {
    objs.forEach(function(o) { fabricCanvas.remove(o); });
    fabricCanvas.discardActiveObject();
    fabricCanvas.renderAll();
    saveDrawState();
  }
}

function setDrawZoom(val) {
  val = Math.max(25, Math.min(400, +val || 100));
  var zs = document.getElementById('draw-zoom'), zv = document.getElementById('draw-zoom-val');
  if (zs) zs.value = val;
  if (zv) zv.value = val;
  if (!fabricCanvas) return;
  var cx = fabricCanvas.getWidth() / 2, cy = fabricCanvas.getHeight() / 2;
  fabricCanvas.zoomToPoint(new fabric.Point(cx, cy), val / 100);
}

function onDrawKey(e) {
  if (!fabricCanvas) return;
  if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); if (e.shiftKey) redoDraw(); else undoDraw(); return; }
  if ((e.key === 'Delete' || e.key === 'Backspace') && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); deleteSelected(); return; }
  var editingText = fabricCanvas.getActiveObject();
  if (editingText && editingText.isEditing) return;
  if (!e.metaKey && !e.ctrlKey && !e.altKey && document.activeElement.tagName !== 'INPUT') {
    if (e.key.toLowerCase() === 'r') { fabricCanvas.setViewportTransform([1,0,0,1,0,0]); fabricCanvas.renderAll(); var zs=document.getElementById('draw-zoom'),zv=document.getElementById('draw-zoom-val'); if(zs)zs.value=100; if(zv)zv.value=100; e.preventDefault(); return; }
    var toolKeys = { f:'pen', l:'line', v:'select', s:'rect', d:'circle', e:'eraser', z:'fill', t:'text' };
    var k = toolKeys[e.key.toLowerCase()];
    if (k) { setDrawTool(k); e.preventDefault(); return; }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'c') { var o = fabricCanvas.getActiveObject(); if (o) editorClipboard = o.toObject(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'v' && editorClipboard) {
    fabric.util.enlivenObjects([editorClipboard], function(objs) {
      var pasted = [];
      objs.forEach(function(o) { o.set({ left: o.left + 20, top: o.top + 20, selectable: true, evented: true, lockMovementX: false, lockMovementY: false }); fabricCanvas.add(o); pasted.push(o); });
      if (pasted.length === 1) fabricCanvas.setActiveObject(pasted[0]);
      fabricCanvas.renderAll(); saveDrawState();
    });
  }
}

async function saveEditor() {
  if (!fabricCanvas) return;
  var dataUrl = fabricCanvas.toDataURL({ format: 'png', multiplier: 1 });
  document.getElementById('editor-modal').classList.remove('open');
  document.removeEventListener('keydown', onDrawKey);
  var ctx = editorCtx; editorCtx = null;
  var blob = await fetch(dataUrl).then(function(r) { return r.blob(); });
  var filename = 'image-' + Date.now() + '.png';
  setStatus('syncing', 'Uploading image...');
  try {
    var up   = await getUploadUrl(ctx.pageId, filename, 'image');
    await doUpload(blob, up.uploadUrl, 'image/png');
    var conf = await confirmUpload({ notion_id: ctx.pageId, r2_key: up.r2_key, public_url: up.publicUrl, kind: 'image', filename: filename });
    if (!videos[ctx.vi].mediaIndex) videos[ctx.vi].mediaIndex = [];
    videos[ctx.vi].mediaIndex.push({ r2_key: up.r2_key, block_id: conf.block_id, kind: 'image', filename: filename, description: '', public_url: up.publicUrl });
    refreshMediaPanelDOM(ctx.vi);
    var body = document.getElementById('mpb-' + ctx.vi); if (body && !body.classList.contains('open')) toggleMediaPanel(ctx.vi);
    setStatus('saved', 'Image saved!'); setTimeout(function() { setStatus('', 'Ready'); }, 2000);
  } catch (err) { setStatus('error', err.message); }
  try { fabricCanvas.dispose(); } catch {} fabricCanvas = null;
}

function cancelEditor() {
  document.getElementById('editor-modal').classList.remove('open');
  document.removeEventListener('keydown', onDrawKey);
  try { if (fabricCanvas) { fabricCanvas.dispose(); fabricCanvas = null; } } catch {}
  editorCtx = null;
}

// ── Compact overflow menu ────────────────────────────────────
function toggleMenu(btn, e, vi, si) {

    '<button onclick="moveSeg(' + vi + ',' + si + ',1);closeMenus()">&#8594; Move Right</button>' +
    '<button onclick="copySeg(' + vi + ',' + si + ');closeMenus()">&#x2398; Copy</button>' +
    '<button onclick="pasteSeg(' + vi + ',' + si + ');closeMenus()">&#x2397; Paste</button>' +
    '<button class="del" onclick="delSeg(' + vi + ',' + si + ')">&#215; Delete</button>';

}
function closeMenus() { document.querySelectorAll('.seg-dropdown').forEach(m => m.remove()); }

function setupCardSelect() {

      document.querySelectorAll('.seg').forEach(s => s.classList.remove('seg-selected'));

}
function setupHoverTracking() {

    container.addEventListener('mouseover', () => { lastHoveredVi = +container.dataset.vi; });
  });
}
document.addEventListener('click', e => {
